<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Ppoiの生態1</title>
	</head>
	<body>
		<h1>Ppoiは宇宙の片隅で生まれ、四方に散っていきます。<hr/></h1>
		<a href="https://youtu.be/IeSm4tL6kEk?t=76" onclick="window.open('https://youtu.be/IeSm4tL6kEk?t=76', 'BGM', 'width=500,height=300,noopener'); return false;">BGM</a>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/109/three.min.js"></script>
		<script>
			const [WSEG, HSEG] = [64, 32];
			const [MAX_X, MIN_X, MAX_Y, MIN_Y, MAX_Z, MIN_Z] =  [10.0, -10.0, 10.0, -10.0, 10.0, -10.0];
			const renderer = new THREE.WebGLRenderer();
			const scene = new THREE.Scene();
			const camera = createCamera();
			const MAX_PPOIS = 200;
			const ppoiList = [];
			
			const materialMap = new Map();
			function createMaterial(color) {
				let material = materialMap.get(color);
				if (material == null) {
					material = new THREE.MeshStandardMaterial({color: color});
					materialMap.set(color, material);
				}
				return material;
			}
			const sphereGeometry = new THREE.SphereGeometry(1, WSEG, HSEG);
			const cylinderGeometry = new THREE.CylinderGeometry(1.2, 0.8, 10.0, WSEG, 1, false); 
			function createPpoi() {
				const ppoi = new THREE.Group();
				const body  = new THREE.Mesh(sphereGeometry, createMaterial(0x9696c8));
				body.scale.set(8, 10, 4); 
				body.position.set ( 0.0,   0.0,  0.0);
				const lEye  = new THREE.Mesh(sphereGeometry, createMaterial(0x646496));
				lEye.rotation.set(-0.2, -0.3, 0);
				lEye.scale.set(3.6, 4.5, 1.8);
				lEye.position.set (-4.0,   4.0,  2.0);
				const rEye  = new THREE.Mesh(sphereGeometry, createMaterial(0x646496));
				rEye.rotation.set(-0.2, 0.3, 0);
				rEye.scale.set(3.6, 4.5, 1.8); 
				rEye.position.set ( 4.0,   4.0,  2.0);
				const tail  = new THREE.Mesh(cylinderGeometry, createMaterial(0x303030));
				tail.position.set ( 0.0, -11.0, -1.0);
				const tail2 = new THREE.Mesh(sphereGeometry, createMaterial(0x303030));
				tail2.scale.set(0.8, 0.8, 0.8);
				tail2.position.set( 0.0, -16.0, -1.0);
				ppoi.add(body, lEye, rEye, tail, tail2);
				return ppoi;
			}
			function createPpoiEx() {
				const ppoi = createPpoi();
				const scale = 0.01;
				ppoi.scale.set(scale, scale, scale);
				ppoi.rotation.set(Math.random()*Math.PI*2, Math.random()*Math.PI*2, Math.random()*Math.PI*2);
				const dx  = (Math.random()-0.5)*0.05;
				const dy  = (Math.random()-0.5)*0.05;
				const dz  = (Math.random()-0.5)*0.05;
				const drx = (Math.random()-0.5)*0.5;
				const dry = (Math.random()-0.5)*0.5;
				const drz = (Math.random()-0.5)*0.5;
				return [ppoi, dx, dy, dz, drx, dry, drz];
			}
			function createLight() {
				const light = new THREE.DirectionalLight(0xffffff, 2);
				light.position.set(1, 1, 1);
				return light;
			}
			function createAmbientLight() { return new THREE.AmbientLight(0x999999, 2.0); }
			function createBackground() {
				const R = 1000;
				const SIZE = 1000;
				const pos = [];
				for (let i = 0; i < SIZE; ++i) { pos.push(R*(Math.random()-0.5), R*(Math.random()-0.5), -100); }
				const geometry = new THREE.BufferGeometry();
				geometry.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
				const material = new THREE.PointsMaterial({size:1, color:0xffffff});
				return new THREE.Points(geometry, material);
			}
			function getWidth() { return window.innerWidth-20; }
			function getHeight() { return window.innerHeight-150; }
			function createCamera() {
				const camera = new THREE.PerspectiveCamera(75, getWidth() / getHeight(), 1, 1000);
				camera.position.set(0, 0, 5);
				camera.lookAt(new THREE.Vector3(0, 0, 0));
				return camera;
			}
			function inRange(ppoi) {
				return ppoi.position.x < MAX_X && ppoi.position.x > MIN_X
					&& ppoi.position.y < MAX_Y && ppoi.position.y > MIN_Y
					&& ppoi.position.z < MAX_Z && ppoi.position.z > MIN_Z;
			}
			function animate() {
				requestAnimationFrame(animate);
				for (let i = 0; i < ppoiList.length; ++i) {
					const [ppoi, dx, dy, dz, drx, dry, drz] = ppoiList.shift();
					ppoi.position.x += dx;
					ppoi.position.y += dy;
					ppoi.position.z += dz;
					ppoi.rotation.x += drx;
					ppoi.rotation.y += dry;
					ppoi.rotation.z += drz;
					if (inRange(ppoi)) {
						ppoiList.push([ppoi, dx, dy, dz, drx, dry, drz]);
					}
					else {
						scene.remove(ppoi);
					}
				}
				if (Math.random() < 0.1 && ppoiList.length < MAX_PPOIS) {
					const [newPpoi, dx, dy, dz, drx, dry, drz] = createPpoiEx();
					scene.add(newPpoi);
					ppoiList.push([newPpoi, dx, dy, dz, drx, dry, drz]);
					console.log('add. ' + ppoiList.length);
				}
				renderer.render(scene, camera);
			}
			
			function main() {
				renderer.setSize(getWidth(), getHeight());
				document.body.appendChild(renderer.domElement);
				scene.add(createLight());
				scene.add(createAmbientLight());
				scene.add(createBackground());
				renderer.render(scene, camera);
				window.addEventListener('resize', () => {
					renderer.setSize(getWidth(), getHeight());
					camera.aspect = getWidth() / getHeight();
					camera.updateProjectionMatrix();
				});
				animate();
			}
			
			main();
		</script>
	</body>
</html>
