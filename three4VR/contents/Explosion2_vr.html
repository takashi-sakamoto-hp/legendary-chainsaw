			const canvas	= document.querySelector('#canvas');
			const control	= document.querySelector('#control');
			function getWidth()  { return canvas.getBoundingClientRect().width; }
			function getHeight() { return canvas.getBoundingClientRect().height; }
			const NUM = 16;
			
			const scene = new THREE.Scene();
			const directionLight = new THREE.DirectionalLight(0xffffff, 3);
			directionLight.position.set(1, 1, 1);
			directionLight.target.position.set(0, 0, 0);
			scene.add(directionLight);
			scene.add(new THREE.AmbientLight(0x999999, 3));
			
			let G = 0;
			function createTNT() {
				const tnt = new THREE.Group();
				tnt.userData.id = 'TNT';
				const params = [];
				for (let i = 0; i < NUM; ++i) {
					const x = i-(NUM-1)/2;
					for (let j = 0; j < NUM; ++j) {
						const y = j-(NUM-1)/2;
						for (let k = 0; k < NUM; ++k) {
							const z = k-(NUM-1)/2;
							const index = ((i*NUM+j)*NUM)+k;
							params[index] = {x: x, y: y, z: z};
							let type = TNT_DIM[i][NUM-j-1][k];
							if (type == 9) { type = Math.floor(TNT_MAT.length*Math.random()); }
							tnt.add(new THREE.Mesh(TNT_PART, TNT_MAT[type]));
						}
					}
				}
				tnt.scale.set(0.1, 0.1, 0.1);
				return [tnt, params];
			}
			function resetTNT() {
				for (let i = 0; i < NUM; ++i) {
					for (let j = 0; j < NUM; ++j) {
						for (let k = 0; k < NUM; ++k) {
							const index = ((i*NUM+j)*NUM)+k;
							tnt.children[index].position.set(params[index].x, params[index].y, params[index].z);
							tnt.children[index].rotation.set(0, 0, 0);
						}
					}
				}
				return tnt;
			}
			function setTNTParams() {
				G = Number(document.querySelector('#g').value)*5/10000;
				const v		= Number(document.querySelector('#v').value)/2;
				const r		= Number(document.querySelector('#r').value)/50;
				for (let i = 0; i < NUM; ++i) {
					for (let j = 0; j < NUM; ++j) {
						for (let k = 0; k < NUM; ++k) {
							const index = ((i*NUM+j)*NUM)+k;
							params[index] = {...params[index],
								vx: ((params[index].x+(Math.random()-0.5))*(Math.random()-0.5)*v  )*0.05,
								vy: ((params[index].y+(Math.random()-0.5))*(Math.random()-0.5)*v+6)*0.05,
								vz: ((params[index].z+(Math.random()-0.5))*(Math.random()-0.5)*v  )*0.05,
								rx: (Math.random()-0.5)*r, ry: (Math.random()-0.5)*r, rz: (Math.random()-0.5)*r
							};
						}
					}
				}
			}
			
			const [tnt, params] = createTNT();
			setTNTParams();
			scene.add(tnt);
			
			const renderer = new THREE.WebGLRenderer();
			renderer.setSize(getWidth(), getHeight());
			renderer.setClearColor(0x404040);
			renderer.xr.enabled = true;

			renderer.xr.getController(0).addEventListener('selectstart', () => { dir = (dir == 0)?-1:0; });
			renderer.xr.getController(1).addEventListener('selectstart', () => { dir = (dir == 0)? 1:0; });

			canvas.appendChild(renderer.domElement);
			canvas.appendChild(VRButton.createButton(renderer));

			const camera = new THREE.PerspectiveCamera(75, getWidth()/getHeight(), 0.01, 5000);
			camera.updateProjectionMatrix();
			const rig = new THREE.Group();
			rig.add(camera);
			rig.position.set(0, -1.6, 8);
			scene.add(rig);
			
			let dir = 0;
			let time = 0;
			let elapsed = 0;
			function reset() {
				console.log(elapsed);
				elapsed = 0;
				dir = 0;
				time = 0;
				control.classList.remove('running');
				resetTNT();
				setTNTParams();
			};

			reset();
			document.querySelector('#play')  .addEventListener('click', () => { dir =  1; });
			document.querySelector('#pause') .addEventListener('click', () => { dir =  0; });
			document.querySelector('#rewind').addEventListener('click', () => { dir = -1; });
			document.querySelector('#rec')	 .addEventListener('click', () => {
				const stream = renderer.domElement.captureStream(30);
				const recorder = new MediaRecorder(stream, {mimeType: 'video/webm;codecs=vp9'});
				const chunks = [];
				recorder.ondataavailable = (e) => chunks.push(e.data);
				recorder.onstop = () => {
				  const blob = new Blob(chunks, {type: 'video/webm'});
				  const a = document.createElement('a');
				  a.href = URL.createObjectURL(blob);
				  a.download = 'recorded.webm';
				  a.click();
				};
				recorder.start();
				setTimeout(() => recorder.stop(), 16000);
			});
			document.querySelectorAll('.reset').forEach((element) => element.addEventListener('input', reset));
			function animate() {
				if (dir != 0) {
					time += dir * Number(document.querySelector('#s').value)/10;
					control.classList.add("running");
					if (time > 1000 || time <= 0) { reset(); }
					else {
						const start = performance.now()
						for (let i = 0; i < NUM*NUM*NUM; ++i) {
							const p = params[i];
							const part = tnt.children[i];
							part.position.set(p.x + p.vx*time, p.y + p.vy*time - 0.5*G*time*time, p.z + p.vz*time);
							part.rotation.set(p.rx*time, p.ry*time, p.rz*time);
						}
						elapsed += performance.now() - start;
					}
				}
				renderer.render(scene, camera);
			}
			renderer.setAnimationLoop(animate);
			
			const raycaster = new THREE.Raycaster();
			const mouse = new THREE.Vector2();
			renderer.domElement.addEventListener('pointerdown', event => {
				const rect = renderer.domElement.getBoundingClientRect();
				const x =  ((event.clientX - rect.left)/rect.width)*2 - 1;
				const y = -((event.clientY - rect.top)/rect.height)*2 + 1;
				mouse.set(x, y);
				raycaster.setFromCamera(mouse, camera);
				const intersects = raycaster.intersectObjects(scene.children, true);
				if (intersects.length > 0) {
					let obj = intersects[0].object;
					while (obj.parent && !(obj.userData && obj.userData.id)) { obj = obj.parent; }
					if (obj.userData && obj.userData.id == 'TNT') { dir = 1; }
				}
			});
