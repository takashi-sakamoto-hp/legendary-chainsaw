<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="Author" content="Sakamoto Takashi">
		<title>28</title>
		<style>
			label		{ margin-right: 5px; }
			input		{ width: 100px;}
			th			{ text-align: left; }
			td			{ text-align: center; }

			#colorSet	{ position: absolute; top: 10px; right: 10px; z-index: 1; }
			#canvas		{ position: absolute; top: 0px; left: 0px; z-index: 0; }

	<body>
		<div id="control">
			<table>
				<tr><th rowspan="2">カメラ移動</th><th>左</th><td><input id="iCameraMoveLR" class="long" type="range" min="-40" max="40" step="1" value="0"></td><th>右</th></tr>
				<tr>							<th>前</th><td><input id="iCameraMoveFB" class="long" type="range" min="-40" max="40" step="1" value="0"></td><th>後</th></tr>
			</table>
			<br>
			<table>
				<tr><th rowspan="2">カメラ回転</th><th>左</th><td><input id="iCameraRotLR" class="long" type="range" min="-40" max="40" step="1" value="0"></td><th>右</th></tr>
				<tr>							<th>上</th><td><input id="iCameraRotUD" class="long" type="range" min="-40" max="40" step="1" value="0"></td><th>下</th></tr>
			</table>
		</div>
		<div id="colorSet">
			<table>
				<tr><td colspan="2"><button id="bReset" style="margin-right: 30px;">Reset</button><button id="bSave" style="margin-right: 5px;">Save</button><button id="bLoad">Load</button></td></tr>
				<tr><td colspan="2">&nbsp;</td></tr>
				<tr><th>部位</th>		<td><span id="lName"></span></td></tr>
				<tr><th>色</th>		<td><input type="color" id="iColor"></td></tr>
				<tr><th>金属度</th>	<td><input type="range" id="iMetalness" min="0.0" max="1.0" step="0.05"></td></tr>
				<tr><th>平滑度</th>	<td><input type="range" id="iRoughness" min="0.0" max="1.0" step="0.05"></td></tr>
			</table>
		</div>
		<div id="canvas" style="width: 100%; height: 100%;"></div>
		<script type="importmap">
			{
			  "imports": {
				"three": "https://unpkg.com/three@0.164.0/build/three.module.js",
				"three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
			  }
			}
		</script>
		<script type="module">
			import * as THREE from 'three';
			import { VRButton } from 'https://unpkg.com/three@0.164.0/examples/jsm/webxr/VRButton.js';
			import { XRControllerModelFactory } from 'https://unpkg.com/three@0.164.0/examples/jsm/webxr/XRControllerModelFactory.js';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			class Iron28 {
				#geometryMap = new Map();
				#materialMap = new Map();
				#object = null;

				setGeometry(id, geometry) {
					if (this.#geometryMap.get(id) != null) { throw new Error('geometry already registered: ' + id); }
					this.#geometryMap.set(id, geometry);
				}
				getGeometry(id) {
					const ret = this.#geometryMap.get(id);
					if (ret == null) { throw new Error('geometry not found: ' + id); }
					return ret;
				}
				setMaterial(id, material) {
					const oldMaterial = this.#materialMap.get(id);
					material.name = id;
					this.#materialMap.set(id, material);
					if (oldMaterial != null) { oldMaterial.dispose(); }
					if (this.#object == null) { return; }
					this.#object.traverse((obj) => {
						if (obj instanceof THREE.Mesh) {
							if (obj.material.name != null && obj.material.name == id) {
								obj.material = material;
								obj.material.needsUpdate = true;
							}
						}
					});
				}
				getMaterial(id) {
					const ret = this.#materialMap.get(id);
					if (ret == null) { throw new Error('material not found: ' + id); }
					return ret;
				}

				getPath(pathStr, path = null) {
					let elem = pathStr.match(/[A-Za-z]|-?\d+(\.\d+)?/g);
					if (elem.length == 0) { throw new Error(); }
					if (path == null) { path = new THREE.Path(); }
					let index = 0;
					while (index < elem.length) {
						let token = elem[index++];
						switch (token) {
						case 'M':
							if (index + 2 > elem.length) { throw new Error(); }
							path.moveTo(Number(elem[index]), Number(elem[index+1]));
							index += 2;
							break;
						case 'L':
							if (index + 2 > elem.length) { throw new Error(); }
							path.lineTo(Number(elem[index]), Number(elem[index+1]));
							index += 2;
							break;
						case 'Q':
							if (index + 4 > elem.length) { throw new Error(); }
							path.quadraticCurveTo(
								Number(elem[index]),   Number(elem[index+1]),
								Number(elem[index+2]), Number(elem[index+3]));
							index += 4;
							break;
						case 'C':
							if (index + 6 > elem.length) { throw new Error(); }
							path.bezierCurveTo(
								Number(elem[index]),   Number(elem[index+1]),
								Number(elem[index+2]), Number(elem[index+3]),
								Number(elem[index+4]), Number(elem[index+5]));
							index += 6;
							break;
						case 'Z':
							path.closePath();
							break;
						default:
							console.log('ignore: ' + token);
							break;
						}
					}
					return path;
				}
				createBufferGeometry(positions, indices) {
					const geometry = new THREE.BufferGeometry();
					geometry.setIndex(new THREE.BufferAttribute(new Uint16Array(indices), 1));
					geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
					geometry.computeVertexNormals();
					geometry.computeBoundingSphere();
					return geometry;
				}
				createPolygonGeometry(pointXZs, height) {
					const positions = [];
					const indices = [];
					if (height == 0) {
						positions.push(0, 0, 0);
						pointXZs.forEach(([x, z]) => { positions.push(x, 0, z); });
						for (let i = 0; i < pointXZs.length; ++i) { indices.push(0, (i+0)%pointXZs.length+1, (i+1)%pointXZs.length+1); }
					}
					else {
						positions.push(0, -height/2, 0);
						pointXZs.forEach(([x, z]) => { positions.push(x, -height/2, z); });
						positions.push(0,  height/2, 0);
						pointXZs.forEach(([x, z]) => { positions.push(x,  height/2, z); });
						for (let i = 0; i < pointXZs.length; ++i) {
							indices.push(0,							(i+0)%pointXZs.length+1,					(i+1)%pointXZs.length+1);
							indices.push(pointXZs.length+2,			(i+1)%pointXZs.length+pointXZs.length+2,	(i+0)%pointXZs.length+pointXZs.length+2);
							indices.push((i+0)%pointXZs.length+1,	(i+0)%pointXZs.length+pointXZs.length+2,	(i+1)%pointXZs.length+pointXZs.length+2);
							indices.push((i+0)%pointXZs.length+1,	(i+1)%pointXZs.length+pointXZs.length+2,	(i+1)%pointXZs.length+1);
						}
					}
					return this.createBufferGeometry(positions, indices);
				}
				changeGeometry(geometry, func) {
					const pos = geometry.attributes.position;
					const arr = pos.array;
					for (let i = 0; i < arr.length; i += 3) { [arr[i], arr[i+1], arr[i+2]] = func([arr[i], arr[i+1], arr[i+2]]); }
					pos.needsUpdate = true;
					geometry.computeVertexNormals();
					return geometry;
				}

				createVisorGeometry() {
					return this.changeGeometry(this.getGeometry('Cylinder').clone(), ([x,y,z]) => {
						const p = 1 - (x**2 + z**2);
						y = ((y<0)?-0.05:0.05)+p;
						return [x, y, (z<0)?0:z]
					})
				}
				createMaskGeometry(r, height, d, thetaStart = 0, thetaLength = Math.PI*2) {
					const rr = 3;
					// points
					const outPoints = [];
					const inPoints = [];
					const [ro, ri] = [r+d/2, r-d/2];
					let [start, len, segment] = [thetaStart, 0.4, 16];
					for (let i = 0; i < segment-4; ++i) {
						const delta = rr*Math.sqrt(1-(1-i/segment*2)**2);
						const cos1 = Math.cos(start+len*i/segment);
						const sin1 = Math.sin(start+len*i/segment);
						outPoints.push(ro*cos1, height/2*delta, ro*sin1, ro*cos1, -height/2*delta, ro*sin1);			// outside
						inPoints .push(ri*cos1, height/2*delta, ri*sin1, ri*cos1, -height/2*delta, ri*sin1);			// inside
					}
					[start, len, segment] = [thetaStart+0.4, thetaLength-0.8, 100];
					for (let i = 0; i < segment+1; ++i) {
						const cos1 = Math.cos(start+len*i/segment);
						const sin1 = Math.sin(start+len*i/segment);
						const delta2 = Math.sin(start+len*i/segment)*0.8;
						outPoints.push(ro*cos1, height/2, ro*sin1, ro*cos1, -height/2-delta2, ro*sin1);						// outside
						inPoints .push(ri*cos1, height/2, ri*sin1, ri*cos1, -height/2-delta2, ri*sin1);						// inside
					}
					[start, len, segment] = [thetaStart+thetaLength-0.4, 0.4, 16];
					for (let i = 4; i <= segment; ++i) {
						const delta = rr*Math.sqrt(1-(1-i/segment*2)**2);
						const cos1 = Math.cos(start+len*i/segment);
						const sin1 = Math.sin(start+len*i/segment);
						outPoints.push(ro*cos1, height/2*delta, ro*sin1, ro*cos1, -height/2*delta, ro*sin1);			// outside
						inPoints .push(ri*cos1, height/2*delta, ri*sin1, ri*cos1, -height/2*delta, ri*sin1);			// inside
					}
					const positions = [...outPoints, ...inPoints];

					const indices = [];
					// surface
					const n = positions.length/6/2-1;
					for (let i = 0; i < n; ++i) {
						const offset1 = i*2;
						const offset2 = (n+i+1)*2;
						indices.push(offset1+2, offset1+3, offset1+1, offset1+2, offset1+1, offset1+0);		// outside
						indices.push(offset2+2, offset2+1, offset2+3, offset2+2, offset2+0, offset2+1);		// inside
						indices.push(offset1+2, offset2+0, offset2+2, offset1+2, offset1+0, offset2+0);		// top
						indices.push(offset1+3, offset2+3, offset2+1, offset1+3, offset2+1, offset1+1);		// bottom
					}
					if (thetaLength < Math.PI*2-0.001) {
						indices.push(0,		n*2+3,	n*2+2,	0,		1,		n*2+3);
						indices.push(n*2,	n*4+2,	n*4+3,	n*2,	n*4+3,	n*2+1);
					}
					return this.createBufferGeometry(positions, indices);
				}
				createTosakaGeometry() {
					const settings = {curveSegments: 64, steps: 1, depth: 2, bevelEnabled: true, bevelThickness: 0, bevelSize: 0, bevelOffset: 0, bevelSegments: 1};
					const g = new THREE.ExtrudeGeometry(this.getPath('M -9,5 C 5,10 2,-5 6,-5 C 6,-7 3,-9 1,-9 L -7,-2 Z', new THREE.Shape()), settings);
					return g;
				}
				createFaceGeometry() {
					return this.changeGeometry(new THREE.SphereGeometry(1,256,128), ([x,y,z]) => {
						if (z > 0 && Math.abs(x) > 0.1 && Math.abs(x) < 0.6 && y > 0.46 && y < 0.59) {
							const x1 = (Math.abs(x)-0.1)/0.5;
							if (x1 < 0.4) {
								if (y > 0.59-0.13*x1/0.4) { z = 0; }
							}
							else {
								if (y > 0.46+0.13*(x1-0.4)/0.6) { z = 0; }
							}
						}
						return [x, y, z];
					});
				}
				createHead() {
					const m0 = new THREE.Mesh(this.getGeometry('Sphere'), this.getMaterial('Eye'));
					m0.scale.set(1.499, 2.799, 1.499);
					const m1 = new THREE.Mesh(this.createFaceGeometry(), this.getMaterial('Face'));
					m1.scale.set(1.500, 2.800, 1.500);
					const m2 = new THREE.Mesh(this.createMaskGeometry(1.5, 0.3, 0.15, 0, Math.PI), this.getMaterial('Mask'));
					m2.position.set(0,1.1,0);
					const m3 = new THREE.Mesh(this.createVisorGeometry(), this.getMaterial('Visor'));
					m3.scale.set(1.2,1,1.8);	m3.position.set(0,1.5,0);
					const m4 = new THREE.Mesh(new THREE.ConeGeometry(1, 1), this.getMaterial('Nose'));
					m4.scale.set(0.2,1,0.2);	m4.rotation.x = Math.PI/2;	m4.position.set(0, 1.4,2);
					const m5 = new THREE.Mesh(this.createTosakaGeometry(), this.getMaterial('Tosaka'));
					m5.scale.set(0.2,0.2,0.2);	m5.rotation.y = Math.PI/2;	m5.position.set(-0.2, 2.4, -1);
					const head = new THREE.Group();
					head.add(m0, m1, m2, m3, m4, m5);
					return head;
				}

				createJoint1() {
					const m1 = new THREE.Mesh(this.getGeometry('Cylinder'), this.getMaterial('Joint'));
					m1.position.set(0,  -0.5, 0);
					const m2 = new THREE.Mesh(this.getGeometry('Joint1'), this.getMaterial('Joint'));
					m2.position.set(0, -1.05, 0);
					const m3 = new THREE.Mesh(this.getGeometry('Joint1'), this.getMaterial('Joint'));
					m3.rotation.z = Math.PI;	m3.position.set(0,  0.05, 0);
					const leg = new THREE.Group();
					leg.add(m1, m2, m3);
					return leg;
				}
				createJoint2() {
					const m1 = new THREE.Mesh(this.getGeometry('Cylinder2'), this.getMaterial('Joint'));
					m1.position.set(0, -0.5,  0);
					const m2 = new THREE.Mesh(this.getGeometry('Joint1'), this.getMaterial('Joint'));
					m2.scale.set(1.1, 1, 1.1);		m2.position.set(0, -1.05, 0);
					const m3 = new THREE.Mesh(this.getGeometry('Joint1'), this.getMaterial('Joint'));
					m3.rotation.z = Math.PI;		m3.position.set(0,  0.05, 0);
					const leg = new THREE.Group();
					leg.add(m1, m2, m3);
					return leg;
				}

				createShoe() {
					const g1 = this.changeGeometry(this.getGeometry('Sphere').clone(), ([x,y,z]) => {
						return [x*((x < 0)?1.3:0.7), (y > 0)?y*0.6:y*0.1, z*0.7];
					});
					const m1 = new THREE.Mesh(g1, this.getMaterial('ShoeUp'));

					const g2 = this.changeGeometry(this.getGeometry('Sphere').clone(), ([x,y,z]) => {
						return [x*((x < 0)?1.3:0.7), (y > 0.3)?0.35*0.6:(y > 0)?y*0.6:y*0.1, z*0.7];
					});
					const m2 = new THREE.Mesh(g2, this.getMaterial('ShoeDown'));
					m2.scale.set(1.01, 1.01, 1.01);

					const shoe = new THREE.Group();
					shoe.add(m1, m2);
					return shoe;
				}
				createJabaraRing(delta) {
					const geometry = this.changeGeometry(new THREE.TorusGeometry(1, 0.3, 64, 256), ([x,y,z]) => {
						return [x, y, z*(1+x*delta)*0.6];
					});
					const m = new THREE.Mesh(geometry, this.getMaterial('Jabara'));
					return m;
				}
				createRightFootJabara() {
					const delta = 0.3;
					const group = new THREE.Group();
					const m1 = this.createJabaraRing(delta);	m1.rotation.set(Math.PI/2, 0.0, 0);
					const m2 = this.createJabaraRing(delta);	m2.rotation.set(Math.PI/2, 0.1, 0);	m2.position.set(-0.05, 0.3, 0);
					const m3 = this.createJabaraRing(delta);	m3.rotation.set(Math.PI/2, 0.2, 0);	m3.position.set(-0.10, 0.6, 0);
					const m4 = this.createJabaraRing(delta);	m4.rotation.set(Math.PI/2, 0.3, 0);	m4.position.set(-0.15, 0.9, 0);
					group.add(m1, m2, m3, m4);
					return group;
				}
				createRightFoot() {
					const l1 = this.createJoint1();				l1.scale.set(1.5, 3, 1.5);	l1.rotation.set(0, 0, -Math.PI*0.22);
					const l2 = this.createRightFootJabara();	l2.scale.set(0.8, 0.8, 0.8);
					l2.rotation.order = 'YZX';	l2.rotation.set(-0.6, -2.1, -0.2);														l2.position.set(-2.5, -3.2, -0.1);
					const l3 = this.createJoint2();				l3.scale.set(1.5, 4, 1.5);	l3.rotation.set(0.9, 0.2, -Math.PI*0.13);	l3.position.set(-2.5, -3.1, -0.3);
					const l4 = this.createShoe(); 				l4.scale.set(4,3.5,3);		l4.rotation.set(0, 0.7, 0);					l4.position.set(-4.2, -7.5, -4);
					const foot = new THREE.Group();
					foot.add(l1, l2, l3, l4);
					return foot;
				}
				createLeftFootJabara() {
					const delta = 0.5;
					const group = new THREE.Group();
					const m1 = this.createJabaraRing(delta);	m1.rotation.set(Math.PI/2, 0.0, 0);
					const m2 = this.createJabaraRing(delta);	m2.rotation.set(Math.PI/2, 0.2, 0);	m2.position.set(-0.05, 0.3, 0);
					const m3 = this.createJabaraRing(delta);	m3.rotation.set(Math.PI/2, 0.4, 0);	m3.position.set(-0.15, 0.6, 0);
					const m4 = this.createJabaraRing(delta);	m4.rotation.set(Math.PI/2, 0.6, 0);	m4.position.set(-0.35, 0.9, 0);
					group.add(m1, m2, m3, m4);
					return group;
				}
				createLeftFoot() {
					const l1 = this.createJoint1();			l1.scale.set(1.5, 3, 1.5);	l1.rotation.set(-Math.PI*0.3, 0, 0.7);
					const l2 = this.createLeftFootJabara();	l2.scale.set(0.8, 0.8, 0.8);
					l2.rotation.order = 'YZX';	l2.rotation.set(0.6, -Math.PI/2*0.9, 0.2);										l2.position.set(2.6, -1.9, 2.4);
					const l3 = this.createJoint2();			l3.scale.set(1.5, 4, 1.5);	l3.rotation.set(0, 0, 0.5);				l3.position.set(2.8, -2.1, 2.5);
					const l4 = this.createShoe();			l4.scale.set(4,3.5,3);		l4.rotation.set(0, 1.5, 0);				l4.position.set(5.5, -7.5, 2);
					const foot = new THREE.Group();
					foot.add(l1, l2, l3, l4);
					return foot;
				}

				createThumb() {
					const m1 = new THREE.Mesh(this.getGeometry('Sphere'),	this.getMaterial('Hand2'));
					m1.scale.set(1, 1, 1);	m1.position.set(0, 2, 0);
					const m2 = new THREE.Mesh(this.getGeometry('Cylinder'), this.getMaterial('Hand1'));
					m2.scale.set(1, 2, 1);	m2.position.set(0, 1, 0);
					const m3 = new THREE.Mesh(this.getGeometry('Sphere'),	this.getMaterial('Hand2'));
					const g1 = new THREE.Group();	g1.add(m1, m2, m3);	g1.rotation.set(Math.PI*0.4, 0, 0);	g1.position.set(0, 3, 0);
					const m4 = new THREE.Mesh(this.getGeometry('Cylinder'), this.getMaterial('Hand1'));
					m4.scale.set(1, 3, 1);	m4.position.set(0, 1.5, 0);
					const m5 = new THREE.Mesh(this.getGeometry('Sphere'),	this.getMaterial('Hand1'));
					const g2 = new THREE.Group();	g2.add(g1, m4, m5);	g2.rotation.set(Math.PI/2, 0, 0);
					const thumb = new THREE.Group();
					thumb.add(g2);
					return thumb;
				}
				createFinger() {
					const m1 = new THREE.Mesh(this.getGeometry('Sphere'),	this.getMaterial('Hand2'));
					m1.position.set(0, 2, 0);
					const m2 = new THREE.Mesh(this.getGeometry('Cylinder'), this.getMaterial('Hand1'));
					m2.scale.set(1, 2, 1);	m2.position.set(0, 1, 0);
					const m3 = new THREE.Mesh(this.getGeometry('Sphere'),	this.getMaterial('Hand2'));
					const g1 = new THREE.Group();	g1.add(m1, m2, m3);	g1.rotation.set(Math.PI*0.4, 0, 0);		g1.position.set(0, 2, 0);
					const m4 = new THREE.Mesh(this.getGeometry('Cylinder'), this.getMaterial('Hand1'));
					m4.scale.set(1, 2, 1);	m4.position.set(0, 1, 0);
					const m5 = new THREE.Mesh(this.getGeometry('Sphere'),	this.getMaterial('Hand2'));
					const g2 = new THREE.Group();	g2.add(g1, m4, m5);	g2.rotation.set(Math.PI/2, 0, 0);		g2.position.set(0, 3, 0);
					const m6 = new THREE.Mesh(this.getGeometry('Cylinder'), this.getMaterial('Hand1'));
					m6.scale.set(1, 3, 1);	m6.position.set(0, 1.5, 0);
					const m7 = new THREE.Mesh(this.getGeometry('Sphere'),	this.getMaterial('Hand1'));
					const g3 = new THREE.Group();	g3.add(g2, m6, m7);	g3.rotation.set(Math.PI/2, 0, 0);
					const finger = new THREE.Group();
					finger.add(g3);
					return finger;
				}
				createBangle() {
					const bangle = new THREE.Group();
					const m1 = new THREE.Mesh(this.getGeometry('Cylinder'), this.getMaterial('Bangle1'));
					m1.scale.set(1.3, 1, 1.3);
					const m2 = new THREE.Mesh(this.getGeometry('Sphere'), this.getMaterial('Bangle2'));
					m2.scale.set(0.3, 0.3, 0.3);	m2.position.set( 1.58, 0,  0);
					const m3 = new THREE.Mesh(this.getGeometry('Sphere'), this.getMaterial('Bangle2'));
					m3.scale.set(0.3, 0.3, 0.3);	m3.position.set(-1.58, 0,  0);

				createEpron() {
					const r = 1.001;
					const epron = new THREE.Group();
					const g = this.changeGeometry(new THREE.SphereGeometry(r, 128, 32, 0, Math.PI*2, 0, Math.PI/3.8), ([x,y,z]) => {
						y = y - Math.abs(z)*0.49;
						z = (Math.abs(z)<0.01)?z:Math.sign(z)*Math.sqrt(r**2-y**2-x**2);
						return [x,y,z];
					});
					const m1 = new THREE.Mesh(g, this.getMaterial('Epron'));
					epron.add(m1);
					for (let i = 0; i < 18; ++i) {
						const theta = Math.PI*2*i/18;
						const m = new THREE.Mesh(this.getGeometry('Sphere'), this.getMaterial('Epron'));
						m.scale.set(0.05, 0.05, 0.05);
						let r = 0.96;
						let x = Math.cos(theta);
						let z = Math.sin(theta);
						let y = 1 - Math.abs(z)*0.6;
						z = Math.sign(z)*Math.sqrt(r**2-y**2-x**2);
						m.position.set(x,y,z);
						epron.add(m);
					}
					return epron;
				}
				createGreenBeltGeometry(r, height, d, thetaStart = 0, thetaLength = Math.PI*2) {
					const rr = 2.1;
					// points
					const outPoints = [];
					const inPoints = [];
					const [ro, ri] = [r+d/2, r-d/2];
					let [start, len, segment] = [thetaStart, 0.25, 16];
					for (let i = 0; i < segment-4; ++i) {
						const delta = rr*Math.sqrt(1-(1-i/segment*2)**2);
						const cos1 = Math.cos(start+len*i/segment);
						const sin1 = Math.sin(start+len*i/segment);
						outPoints.push(ro*cos1, height/2*delta, ro*sin1, ro*cos1, -height/2*delta, ro*sin1);			// outside
						inPoints .push(ri*cos1, height/2*delta, ri*sin1, ri*cos1, -height/2*delta, ri*sin1);			// inside
					}
					[start, len, segment] = [thetaStart+0.25, thetaLength-0.50, 100];
					for (let i = 0; i < segment+1; ++i) {
						const cos1 = Math.cos(start+len*i/segment);
						const sin1 = Math.sin(start+len*i/segment);
						outPoints.push(ro*cos1, height/2, ro*sin1, ro*cos1, -height/2, ro*sin1);						// outside
						inPoints .push(ri*cos1, height/2, ri*sin1, ri*cos1, -height/2, ri*sin1);						// inside
					}
					[start, len, segment] = [thetaStart+thetaLength-0.25, 0.25, 16];
					for (let i = 4; i <= segment; ++i) {
						const delta = rr*Math.sqrt(1-(1-i/segment*2)**2);
						const cos1 = Math.cos(start+len*i/segment);
						const sin1 = Math.sin(start+len*i/segment);
						outPoints.push(ro*cos1, height/2*delta, ro*sin1, ro*cos1, -height/2*delta, ro*sin1);			// outside
						inPoints .push(ri*cos1, height/2*delta, ri*sin1, ri*cos1, -height/2*delta, ri*sin1);			// inside
					}
					const positions = [...outPoints, ...inPoints];

					const indices = [];
					// surface
					const n = positions.length/6/2-1;
					for (let i = 0; i < n; ++i) {
						const offset1 = i*2;
						const offset2 = (n+i+1)*2;
						indices.push(offset1+2, offset1+3, offset1+1, offset1+2, offset1+1, offset1+0);		// outside
						indices.push(offset2+2, offset2+1, offset2+3, offset2+2, offset2+0, offset2+1);		// inside
						indices.push(offset1+2, offset2+0, offset2+2, offset1+2, offset1+0, offset2+0);		// top
						indices.push(offset1+3, offset2+3, offset2+1, offset1+3, offset2+1, offset1+1);		// bottom
					}
					if (thetaLength < Math.PI*2-0.001) {
						indices.push(0,		n*2+3,	n*2+2,	0,		1,		n*2+3);
						indices.push(n*2,	n*4+2,	n*4+3,	n*2,	n*4+3,	n*2+1);
					}
					return this.createBufferGeometry(positions, indices);
				}

			const canvas		= document.querySelector('#canvas');
			function getWidth()  { return canvas.getBoundingClientRect().width; }
			function getHeight() { return canvas.getBoundingClientRect().height; }

			function setCamera() {
				const iCameraMoveLR	= document.getElementById('iCameraMoveLR');
				const iCameraMoveFB	= document.getElementById('iCameraMoveFB');
				const iCameraRotLR	= document.getElementById('iCameraRotLR');
				const iCameraRotUD	= document.getElementById('iCameraRotUD');
				if (!renderer.xr.isPresenting) {
					camera.position.set(Number(iCameraMoveLR.value)/4, 1.2, Number(iCameraMoveFB.value)/4);
					camera.rotation.order = 'YXZ';
					camera.rotation.y = -Number(iCameraRotLR.value)/40*Math.PI;
					camera.rotation.x = -Number(iCameraRotUD.value)/40*Math.PI/2;
				}
				camera.aspect = getWidth() / getHeight();
				camera.updateProjectionMatrix();
			}

			const scene = new THREE.Scene();
			const directionLight = new THREE.DirectionalLight(0xffffff, 3);
			directionLight.position.set(1, 1, 1);
			directionLight.target.position.set(0, 0, 0);
			scene.add(directionLight);
			scene.add(new THREE.AmbientLight(0x999999, 1));

			const field = new THREE.Mesh(new THREE.BoxGeometry(40, 1, 30), new THREE.MeshStandardMaterial({color: 0xbbaaaa}));
			field.position.set(0, -0.5, -10);
			scene.add(field);

			const iron28 = new Iron28();
			const object = iron28.getObject();
			object.position.set(0, 13.2, -10);
			scene.add(object);

			const renderer = new THREE.WebGLRenderer();
			renderer.setSize(getWidth(), getHeight());
			renderer.setClearColor(0xaaaaaa);
			canvas.appendChild(renderer.domElement);

			const camera = new THREE.PerspectiveCamera(50, getWidth()/getHeight(), 0.1, 1000);
			camera.position.set(0, 1.5, 0);

			renderer.xr.enabled = true;
			canvas.appendChild(VRButton.createButton(renderer));
			function animate() {
				renderer.setSize(getWidth(), getHeight());
				renderer.render(scene, camera);
				setCamera();
			}
			renderer.setAnimationLoop(animate);

			const raycaster = new THREE.Raycaster();
			const mouse = new THREE.Vector2();
			
			const lName			= document.getElementById('lName');
			const iColor		= document.getElementById('iColor');
			const iMetalness	= document.getElementById('iMetalness');
			const iRoughness	= document.getElementById('iRoughness');
			const bApply		= document.getElementById('bApply');
			const bReset		= document.getElementById('bReset');
			const bSave			= document.getElementById('bSave');
			const bLoad			= document.getElementById('bLoad');
			const materials		= [
				'Shoulder',	'Rocket',	'Bangle1',	'Bangle2',	'RocketBelt',	'Epron',	'HipBelt',	'Body',
				'Eye',		'Face',		'Mask',		'Visor',	'Nose',			'Tosaka',
				'Joint',	'Jabara',	'Hand1',	'Hand2',	'ShoeUp',		'ShoeDown'
			];

			window.addEventListener("resize", () => {
				camera.aspect = getWidth() / getHeight();
				camera.updateProjectionMatrix();
				renderer.setSize(getWidth(), getHeight());
				renderer.setPixelRatio(window.devicePixelRatio);
				renderer.render(scene, camera);
			});
			window.addEventListener('click', (event) => {
				mouse.x =  (event.clientX / getWidth())  * 2 - 1;
				mouse.y = -(event.clientY / getHeight()) * 2 + 1;
				raycaster.setFromCamera(mouse, camera);
				const intersects = raycaster.intersectObjects(scene.children, true);
				if (intersects.length > 0) {
					const hit = intersects[0].object;
					if (hit.material.name != null && hit.material.name.length > 0) {
						lName.textContent	= hit.material.name;
						iColor.value		= '#' + hit.material.color.getHexString();
						iMetalness.value	= hit.material.metalness;
						iRoughness.value	= hit.material.roughness;
					}
				}
			});
			function changeMaterial() {
				if (lName.textContent.length <= 0) { return; }
				const material = new THREE.MeshStandardMaterial({ color: iColor.value, metalness: iMetalness.value, roughness: iRoughness.value });
				iron28.setMaterial(lName.textContent, material);
			}
			iColor		.addEventListener('input', changeMaterial);
			iMetalness	.addEventListener('input', changeMaterial);
			iRoughness	.addEventListener('input', changeMaterial);
			
			bReset.addEventListener('click', () => iron28.resetMaterial());
			bSave .addEventListener('click', async () => {
				const data = [];
				materials.forEach((id) => {
					const material = iron28.getMaterial(id);
					data.push({id: id, color: '#' + material.color.getHexString(), metalness: material.metalness, roughness: material.roughness});
				});
				const json = JSON.stringify(data, null, 2);
				const handle = await window.showSaveFilePicker({suggestedName: "iron28.json", types: [{accept: {"application/json": [".json"]}}]});
				const writable = await handle.createWritable();
				await writable.write(json);
				await writable.close();
			});
			bLoad .addEventListener('click', async () => {
				const [handle] = await window.showOpenFilePicker({types: [{description: "JSON Files", accept: {"application/json": [".json"]}}], multiple: false});
				const file = await handle.getFile();
				const data = JSON.parse(await file.text());
				data.forEach((datum) => {
					const material = new THREE.MeshStandardMaterial({color: datum.color, metalness: datum.metalness, roughness: datum.roughness});
					iron28.setMaterial(datum.id, material);
				});
			});
		</script>
	</body>
</html>
