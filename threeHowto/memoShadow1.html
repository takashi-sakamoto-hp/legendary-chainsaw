<!DOCTYPE html>
<html>
	<head>
		<style>
		#canvas		{ position: absolute; top: 0px; left: 0px; z-index: 0; }
		</style>
		<script type="importmap">
		{
		  "imports": {
			"three": "https://unpkg.com/three@0.164.0/build/three.module.js",
			"three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
		  }
		}
		</script>
	</head>
	<body>
		<div id="canvas" style="width: 100%; height: 100%;"></div>
		<script type="module">
		import * as THREE from 'three';
		import { VRButton } from 'https://unpkg.com/three@0.164.0/examples/jsm/webxr/VRButton.js';
		import { XRControllerModelFactory } from 'https://unpkg.com/three@0.164.0/examples/jsm/webxr/XRControllerModelFactory.js';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

		const canvas = document.querySelector('#canvas');
		function getWidth()  { return canvas.getBoundingClientRect().width; }
		function getHeight() { return canvas.getBoundingClientRect().height; }

		// 空間(scene)を準備する。
		const scene = new THREE.Scene();

		// 描画対象の立方体を作って空間(scene)に配置する。
		const geometry = new THREE.BoxGeometry(1, 1, 1);
		const material = new THREE.MeshStandardMaterial({color: 0xffff00, metalness: 0.5, roughness: 0.5});
		const mesh = new THREE.Mesh(geometry, material);
		mesh.castShadow = true;
		scene.add(mesh);

		// 影を受けるオブジェクトを作る。
		const geometry2 = new THREE.BoxGeometry(5, 1, 5);
		const material2 = new THREE.MeshStandardMaterial({color: 0xa0a0a0});
		const field = new THREE.Mesh(geometry2, material2);
		field.position.y = -1;
		field.receiveShadow  = true;
		scene.add(field);
		
		// ライト(light)を作って空間(scene)に配置する。
		const directionLight = new THREE.DirectionalLight(0xffffff, 3);
		directionLight.position.set(1, 1, 1);
		directionLight.target.position.set(0, 0, 0);
		directionLight.castShadow = true;
		directionLight.shadow.mapSize.width = 1024;
		directionLight.shadow.mapSize.height = 1024;
		directionLight.shadow.camera.left = -5;
		directionLight.shadow.camera.right = 5;
		directionLight.shadow.camera.top = 5;
		directionLight.shadow.camera.bottom = -5;
		directionLight.shadow.camera.near = 0.1;
		directionLight.shadow.camera.far = 100;
		directionLight.shadow.bias = -0.0001;
		scene.add(directionLight);
		const ambientLight = new THREE.AmbientLight(0x999999, 2);
		scene.add(ambientLight);

		// カメラ(camera)を作る。
		const camera = new THREE.PerspectiveCamera(50, getWidth()/getHeight(), 0.1, 1000);
		camera.position.set(-1, 1, 2);
		camera.lookAt(0, 0, 0);

		// レンダラ(renderer)を作って、空間(scene)とカメラ(camera)を設定する。
		const renderer = new THREE.WebGLRenderer();
		renderer.setSize(getWidth(), getHeight());
		renderer.setClearColor(0xdddddd);
		renderer.shadowMap.enabled = true;
		renderer.render(scene, camera);

		// キャンバス(canvas)にレンダラ(renderer)を追加する。
		canvas.appendChild(renderer.domElement);

		const controls = new OrbitControls(camera, renderer.domElement);
		function animate() {
			controls.update();
			renderer.setSize(getWidth(), getHeight());
			renderer.render(scene, camera);
		}
		renderer.setAnimationLoop(animate);
		</script>
	</body>
</html>
