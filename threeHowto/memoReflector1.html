<!DOCTYPE html>
<html>
	<head>
		<style>
		#canvas		{ position: absolute; top: 0px; left: 0px; z-index: 0; }
		</style>
		<script type="importmap">
		{
		  "imports": {
			"three": "https://unpkg.com/three@0.164.0/build/three.module.js",
			"three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
		  }
		}
		</script>
	</head>
	<body>
		<div id="canvas" style="width: 100%; height: 100%;"></div>
		<script type="module">
		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { Reflector } from 'three/addons/objects/Reflector.js';
		
		const canvas = document.querySelector('#canvas');
		function getWidth()  { return canvas.getBoundingClientRect().width; }
		function getHeight() { return canvas.getBoundingClientRect().height; }

		const scene = new THREE.Scene();

		const geometry1 = new THREE.BoxGeometry(1, 1, 1);
		const material1 = new THREE.MeshStandardMaterial({color: 0xffff00, metalness: 0.5, roughness: 0.5});
		const mesh1 = new THREE.Mesh(geometry1, material1);
		mesh1.position.set(-1, 0, 0);
		scene.add(mesh1);
		const geometry2 = new THREE.SphereGeometry(1);
		const material2 = new THREE.MeshStandardMaterial({color: 0xff0000, metalness: 0.5, roughness: 0.5});
		const mesh2 = new THREE.Mesh(geometry2, material2);
		mesh2.position.set(1, 0, 0);
		scene.add(mesh2);

		const mirror = new Reflector(
			new THREE.PlaneGeometry(8, 4),
			{clipBias: 0.003,　textureWidth: window.innerWidth * window.devicePixelRatio,　textureHeight: window.innerHeight * window.devicePixelRatio,　color: 0x777777}
		);
		mirror.position.set(0, 0, -4);
		scene.add(mirror);
		
		const directionLight = new THREE.DirectionalLight(0xffffff, 3);
		directionLight.position.set(1, 1, 1);
		directionLight.target.position.set(0, 0, 0);
		scene.add(directionLight);
		const ambientLight = new THREE.AmbientLight(0x999999, 2);
		scene.add(ambientLight);

		const camera = new THREE.PerspectiveCamera(50, getWidth()/getHeight(), 0.1, 1000);
		camera.position.set(-1, 1, 4);
		camera.lookAt(0, 0, 0);

		const renderer = new THREE.WebGLRenderer();
		renderer.setSize(getWidth(), getHeight());
		renderer.setClearColor(0xdddddd);
		renderer.render(scene, camera);

		canvas.appendChild(renderer.domElement);

		const controls = new OrbitControls(camera, renderer.domElement);
		function animate() {
			controls.update();
			renderer.setSize(getWidth(), getHeight());
			renderer.render(scene, camera);
		}
		renderer.setAnimationLoop(animate);
		</script>
	</body>
</html>
