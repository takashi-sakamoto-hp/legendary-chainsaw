<!DOCTYPE html>
<html>
	<head>
		<style>
		#canvas		{ position: absolute; top: 0px; left: 0px; z-index: 0; }
		</style>
		<script type="importmap">
		{
		  "imports": {
			"three": "https://unpkg.com/three@0.164.0/build/three.module.js",
			"three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
		  }
		}
		</script>
	</head>
	<body>
		<div id="canvas" style="width: 100%; height: 100%;"></div>
		<script type="module">
		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { Reflector } from 'three/addons/objects/Reflector.js';
		
		const canvas = document.querySelector('#canvas');
		function getWidth()  { return canvas.getBoundingClientRect().width; }
		function getHeight() { return canvas.getBoundingClientRect().height; }

		const scene = new THREE.Scene();

		const geometry1 = new THREE.BoxGeometry(1, 1, 1);
		const material1 = new THREE.MeshStandardMaterial({color: 0xffff00, metalness: 0.5, roughness: 0.5});
		const mesh1 = new THREE.Mesh(geometry1, material1);
		mesh1.position.set(-1, 0, 0);
		const geometry2 = new THREE.SphereGeometry(1);
		const material2 = new THREE.MeshStandardMaterial({color: 0x00ffff, metalness: 0.5, roughness: 0.5});
		const mesh2 = new THREE.Mesh(geometry2, material2);
		mesh2.position.set(1, 0, 0);
		scene.add(mesh1, mesh2);

		// 反射する球面を作る
		const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, {format: THREE.RGBAFormat, generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter});
		const cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
		scene.add(cubeCamera);
		const metalMaterial = new THREE.MeshStandardMaterial({color: 0xa08080, metalness: 1.0, roughness: 0.05, envMap: cubeRenderTarget.texture});
		const mirror = new THREE.Mesh(new THREE.SphereGeometry(2, 64, 64), metalMaterial);
		mirror.position.set(-2, 1, -3);
		scene.add(mirror);

		const directionLight = new THREE.DirectionalLight(0xffffff, 3);
		directionLight.position.set(1, 1, 1);
		directionLight.target.position.set(0, 0, 0);
		scene.add(directionLight);
		const ambientLight = new THREE.AmbientLight(0x999999, 2);
		scene.add(ambientLight);

		const camera = new THREE.PerspectiveCamera(50, getWidth()/getHeight(), 0.1, 1000);
		camera.position.set(-1, 1, 5);
		camera.lookAt(0, 0, 0);

		const renderer = new THREE.WebGLRenderer();
		renderer.setSize(getWidth(), getHeight());
		renderer.setClearColor(0xdddddd);
		renderer.render(scene, camera);

		canvas.appendChild(renderer.domElement);

		const controls = new OrbitControls(camera, renderer.domElement);
		function animate() {
			controls.update();
			
			//　反射を描く
			mirror.visible = false;
			cubeCamera.position.set(mirror.position.x+0.5, mirror.position.y-0.5, mirror.position.z+2);
			cubeCamera.lookAt(0,0,0);
			cubeCamera.update(renderer, scene);
			mirror.visible = true;
			
			renderer.setSize(getWidth(), getHeight());
			renderer.render(scene, camera);
		}
		renderer.setAnimationLoop(animate);
		</script>
	</body>
</html>
