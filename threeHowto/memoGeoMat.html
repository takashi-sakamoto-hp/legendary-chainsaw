<!DOCTYPE html>
<html lang="ja" class="notranslate" translate="no">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="Author" content="Sakamoto Takashi">
		<title>図形(geometry)</title>
		<style>
			body { background: whitesmoke; padding: 5px 10px 5px 10px; line-height: 1.5; }
			h1 { font-size: 160%; color: black; margin-bottom: 0px; text-shadow: 3px 3px 3px lightgray; line-height: 1.5; margin-bottom: 0; }
			h2 { font-size: 140%; color: black; text-shadow: 2px 2px 2px lightgray; }
			h3 { font-size: 100%; color: black; text-shadow: 1px 1px 2px lightgray; }
			div.indent { margin-left: 2em; }
			div { padding-bottom: 0.5em; }
			span.code { font-family: monospace; background-color: #fff0d0; border:1px solid #c0c0a0; border-radius: 0.2em; padding: 0.2em 0.2em; margin: 0 0.2em;}
			div.code {white-space: pre-wrap; tab-size: 4; font-family: monospace; background-color: #fff0d0; border:1px solid #c0c0a0; border-radius: 0.2em; padding: 0.2em 0.2em; margin: 0.5em 0.2em;}
			span.strong {font-weight: bold; color:red; }
			table { font-size: 90%; border: solid 1px; }
			.canvas { width: 300px; height: 200px; }
		</style>
		<script type="importmap">
		{
		  "imports": {
			"three": "https://unpkg.com/three@0.164.0/build/three.module.js",
			"three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
		  }
		}
		</script>
	</head>
	<body>
		<h1>図形(geometry)<hr></h1>
		<h2>概要</h2>
		<div class="indent">
			ここではThree.jsに組み込まれている代表的な図形(geometry)を紹介する。パラメータの詳細についてはオフィシャルサイトを参照のこと。
		</div>
		<h2>図形(geometry)</h2>
		<div class="indent">
			<table>
				<tr>	<th>直方体(box)</th>					<th>球(sphere)</th>					<th>円錐(cone)</th>					<th>円柱(cylinder)</th>				</tr>
				<tr>	<td id="c01" class="canvas"></td>	<td id="c02" class="canvas"></td>	<td id="c03" class="canvas"></td>	<td id="c04" class="canvas"></td>	</tr>
			</table>
			<br>
			<table>
				<tr>	<th>ドーナツ(torus)</th>				</tr>
				<tr>	<td id="c05" class="canvas"></td>	</tr>
			</table>
		</div>

		<h2>図形(geometry)</h2>
		<div class="indent">
		</div>
		<script type="module">
		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		
		class GeoMat {
			#scene;
			#camera;
			#renderer;
			#control;
			constructor(object, width = 300, height = 200) {
				this.#scene = new THREE.Scene();
				this.#scene.add(object);
				const directionLight = new THREE.DirectionalLight(0xffffff, 3);
				directionLight.position.set(1, 1, 1);
				directionLight.target.position.set(0, 0, 0);
				this.#scene.add(directionLight);
				this.#scene.add(new THREE.AmbientLight(0x999999, 2));
				this.#camera = new THREE.PerspectiveCamera(50, width/height, 0.1, 1000);
				this.#camera.position.set(-1, 1, 3);
				this.#camera.lookAt(0, 0, 0);
				this.#renderer = new THREE.WebGLRenderer();
				this.#renderer.setSize(width, height);
				this.#renderer.setClearColor(0xdddddd);
				this.#renderer.render(this.#scene, this.#camera);
				this.#control = new OrbitControls(this.#camera, this.#renderer.domElement);
			}
			getRenderer() { return this.#renderer; }
			animate() {
				this.#control.update();
				this.#renderer.render(this.#scene, this.#camera);
			}
		}
		
		const objects = [
			new GeoMat(new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.3, 1.3),			new THREE.MeshStandardMaterial({color: 0xff0000}))),
			new GeoMat(new THREE.Mesh(new THREE.SphereGeometry(1),					new THREE.MeshStandardMaterial({color: 0x00ff00}))),
			new GeoMat(new THREE.Mesh(new THREE.ConeGeometry(0.8, 2),				new THREE.MeshStandardMaterial({color: 0x0000ff}))),
			new GeoMat(new THREE.Mesh(new THREE.CylinderGeometry(0.5, 1, 1.5),		new THREE.MeshStandardMaterial({color: 0xffff00}))),
			new GeoMat(new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.3),			new THREE.MeshStandardMaterial({color: 0xff00ff}))),
		];
		for (let i = 0; i < objects.length; ++i) { document.querySelector('#c' + String(i+1).padStart(2, '0')).appendChild(objects[i].getRenderer().domElement); }
		function animate() { objects.forEach((v) => v.animate()); }
		objects[0].getRenderer().setAnimationLoop(animate);
		</script>
	</body>
</html>
