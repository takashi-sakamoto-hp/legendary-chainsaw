<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<title></title>
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<script type="importmap">
	{
	  "imports": {
		"three": "https://unpkg.com/three@0.164.0/build/three.module.js",
		"three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
	  }
	}
	</script>
	<style>
		html, body { margin: 0; overflow: hidden; height: 100%; }
		#canvas { height: 100%; }
	</style>
</head>
<body>
	<div id="canvas"></div>
  
	<script type="module">
		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

		const scene = new THREE.Scene();
		const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
		camera.position.z = 1;
		camera.lookAt(scene.position);

		const renderer = new THREE.WebGLRenderer();
		renderer.setSize(window.innerWidth, window.innerHeight);
		document.getElementById('canvas').appendChild(renderer.domElement);

		const path = './';
		const cubeTextureLoader = new THREE.CubeTextureLoader();
		const textureCube = cubeTextureLoader.load([path + 'posx.jpg', path + 'negx.jpg', path + 'posy.jpg', path + 'negy.jpg', path + 'posz.jpg', path + 'negz.jpg']);
		const shader = THREE.ShaderLib['cube'];
		shader.uniforms['tCube'].value = textureCube;
		const material = new THREE.ShaderMaterial({ fragmentShader: shader.fragmentShader, vertexShader: shader.vertexShader, uniforms: shader.uniforms, depthWrite: false, side: THREE.BackSide});
		scene.add(new THREE.Mesh(new THREE.BoxGeometry(100, 100, 100), material));

		const orbitControls = new OrbitControls(camera,renderer.domElement);
		function update() {
			orbitControls.update();
			requestAnimationFrame(renderer);
			renderer.render(scene, camera);
		}

		window.addEventListener("resize", () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.setSize(window.innerWidth, window.innerHeight);
			update();
		});

		update();
	</script>
</body>
</html>
