		<script>
			const canvas	= document.querySelector('#canvas');
			const control	= document.querySelector('#control');
			function getWidth()  { return canvas.getBoundingClientRect().width; }
			function getHeight() { return canvas.getBoundingClientRect().height; }
			
			const scene = new THREE.Scene();
			const directionLight = new THREE.DirectionalLight(0xffffff, 1);
			directionLight.position.set(1, 1, 1);
			directionLight.target.position.set(0, 0, 0);
			scene.add(directionLight);
			scene.add(new THREE.AmbientLight(0x999999, 1));
			
			const tntParts	= [];
			let G = 0;
			function getTNT() {
				G = Number(document.querySelector('#g').value)*5/10000;
				const size	= 1;
				const num	= 16;
				const v		= Number(document.querySelector('#v').value)/2;
				const r		= Number(document.querySelector('#r').value)/50;
				const tnt = new THREE.Group();
				for (let i = 0; i < num; ++i) {
					const x = (i-(num-1)/2)*size;
					for (let j = 0; j < num; ++j) {
						const y = (j-(num-1)/2)*size;
						for (let k = 0; k < num; ++k) {
							const z = (k-(num-1)/2)*size;
							let type = TNT_DIM[i][num-j-1][k];
							if (type == 9) { type = Math.floor(Math.random()*TNT_MAT.length); }
							const mesh = new THREE.Mesh(TNT_PART, TNT_MAT[type]);
							mesh.scale.set(size, size, size);
							mesh.position.set(x, y, z);
							tnt.add(mesh);
							const vx = (x+(Math.random()-0.5))*(Math.random()-0.5)*v;
							const vy = (y+(Math.random()-0.5))*(Math.random()-0.5)*v+6;
							const vz = (z+(Math.random()-0.5))*(Math.random()-0.5)*v;
							const rx = (Math.random()-0.5)*r;
							const ry = (Math.random()-0.5)*r;
							const rz = (Math.random()-0.5)*r;
							tntParts.push({mesh: mesh, x: x, y: y, z: z, vx: vx*0.05, vy: vy*0.05, vz: vz*0.05, rx: rx, ry: ry, rz: rz});
						}
					}
				}
				tnt.position.set(0, 10, 0);
				return tnt;
			}
			
			let tnt = getTNT();
			scene.add(tnt);
			
			const renderer = new THREE.WebGLRenderer();
			renderer.setSize(getWidth(), getHeight());
			renderer.setClearColor(0xaaaaaa);
//			renderer.xr.enabled = true;
			canvas.appendChild(renderer.domElement);
			
			const camera = new THREE.PerspectiveCamera(75, getWidth()/getHeight(), 0.1, 1000);
			camera.position.set(0, 0, 150);
			const controls = new THREE.OrbitControls(camera, renderer.domElement);
			Object.assign(controls, {rotateSpeed: 0.5, enableDamping: true, dampingFactor: 0.05});
			controls.target = new THREE.Vector3(0, 0, 0);
			
			let dir = 0;
			let time = 0;
			function reset() {
				dir = 0;
				time = 0;
				control.classList.remove('running');
				scene.remove(tnt);
				tnt = getTNT();
				scene.add(tnt);
			};
			reset();
			document.querySelector('#play')  .addEventListener('click', () => { dir =  1; });
			document.querySelector('#pause') .addEventListener('click', () => { dir =  0; });
			document.querySelector('#rewind').addEventListener('click', () => { dir = -1; });
			document.querySelector('#rec')	 .addEventListener('click', () => {
				const stream = renderer.domElement.captureStream(30);
				const recorder = new MediaRecorder(stream, {mimeType: 'video/webm;codecs=vp9'});
				const chunks = [];
				recorder.ondataavailable = (e) => chunks.push(e.data);
				recorder.onstop = () => {
				  const blob = new Blob(chunks, {type: 'video/webm'});
				  const a = document.createElement('a');
				  a.href = URL.createObjectURL(blob);
				  a.download = 'recorded.webm';
				  a.click();
				};
				recorder.start();
				setTimeout(() => recorder.stop(), 16000);
			});

			document.querySelectorAll('.reset').forEach((event) => event.addEventListener('input', reset));
			(function animate() {
				if (dir != 0) {
					time += dir*Number(document.querySelector('#s').value)/10;
					control.classList.add("running");
					if (time > 1000 || time <= 0) { reset(); }
					else {
						tntParts.forEach((p) => {
							p.mesh.position.set(p.x + p.vx*time, p.y + p.vy*time - 0.5*G*time*time, p.z + p.vz*time);
							p.mesh.rotation.set(p.rx*time, p.ry*time, p.rz*time);
						});
					}
				}
				requestAnimationFrame(animate);
				controls.update();
				renderer.render(scene, camera);
			})();
		</script>
