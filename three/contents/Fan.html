			`);
			threeUtil.setSize(getWidth(), getHeight());

			const fanBlades = threeUtil.getObject("FanBlades");
			const head = threeUtil.getObject("Head");
			const domElement = threeUtil.getRenderer().domElement;
			while (canvas.firstChild) { canvas.removeChild(canvas.firstChild); }
			canvas.appendChild(domElement);
			const controls = new THREE.OrbitControls(threeUtil.getCamera(), domElement);
			Object.assign(controls, {
				rotateSpeed: 0.5, enableDamping: true, dampingFactor: 0.05,
				minPolarAngle: 0, maxPolarAngle: Math.PI, minAzimuthAngle: -Infinity, maxAzimuthAngle: Infinity
			});


			function animate() {
				requestAnimationFrame(animate);
				animateEx();
				if (controls != null)  { controls.update(); }
				if (threeUtil != null) { threeUtil.update(); }
			}

			let speed = 0;
			let shakeDir = -1;
			let maxSpeed = 0;
			let shake = false;
			function animateEx() {
				function calcShakeDelta(angle) { return (angle > 0.2)?0.006:(0.001+0.005*angle*5); }
				
				speed += (maxSpeed != 0)?0.002:-0.002;
				if		(maxSpeed > 0  && speed > maxSpeed) { speed = maxSpeed; }
				else if (maxSpeed == 0 && speed < maxSpeed) { speed = 0; }
				
				if (fanBlades == null || head == null) { return; }
				fanBlades.rotation.z -= speed;
				if (!shake) { return; }

				if (shakeDir == 1) {
					head.rotation.y += speed*calcShakeDelta(1.2-Math.abs(head.rotation.y));
					if (head.rotation.y >  1.2) { shakeDir = -1; }
				}
				else if (shakeDir == -1) {
					head.rotation.y -= speed*calcShakeDelta(1.2-Math.abs(head.rotation.y));
					if (head.rotation.y < -1.2) { shakeDir =  1; }
				}
			}

			document.querySelector('#level0')	.addEventListener('click', () => { maxSpeed = 0;   });
			document.querySelector('#level1')	.addEventListener('click', () => { maxSpeed = 0.2; });
			document.querySelector('#level2')	.addEventListener('click', () => { maxSpeed = 0.5; });
			document.querySelector('#shake')	.addEventListener('click', () => { shake = !shake; });

			const angle = document.querySelector('#angle');
			angle.addEventListener('input', () => { head.rotation.x = angle.value; });
			window.addEventListener('resize', () => {
				if (threeUtil != null) { threeUtil.setSize(getWidth(), getHeight()); }
			});

			animate();
		</script>
