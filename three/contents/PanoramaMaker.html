<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="Author" content="Sakamoto Takashi">
		<title>Panorama Viewer Maker</title>
		<style>
		body { font-size: 120%; }
		.hidden { display: none; }
		#imageFile { display: none; }
		.title { display: inline-block; width: 3em; }
		</style>
	</head>
	<body>
	<h1>Panorama Viewer Maker<hr></h1>
	<div>
		<span class="title">横幅</span>
			<label><input type="radio" name="resolution" value="2048"			>2048</label>
			<label><input type="radio" name="resolution" value="4096" checked	>4096</label>
			<label><input type="radio" name="resolution" value="8192"			>8192</label>
	</div>
	<div>
		<span class="title">種類</span>
			<label><input type="radio" name="geometry" value="Cylinder" checked	>円筒</label>
			<label><input type="radio" name="geometry" value="Sphere"			>球</label>
	</div>
	<br>
	<label for="imageFile" id="selectButton">パノラマ写真を選択してください</label><input id="imageFile" type="file">
	<div id="saveDiv" class="hidden"><span id="saveFile">保存するファイルを指定してください</span></div>
	<div id="saveEndDiv" class="hidden">保存が完了しました</div>
	<script>
	const RESIZE_WIDTH = 8192;
	const RESIZE_HEIGHT = 4096;
	
	function getImageSize(file) {
		return new Promise((resolve) => {
			const img = new Image();
			img.onload = () => { resolve({ width: img.width, height: img.height }); }
			img.src = URL.createObjectURL(file);
		});
	}
	function resizeImage(file, maxWidth, maxHeight) {
		return new Promise((resolve) => {
			const img = new Image();
			img.onload = () => {
				let width = img.width;
				let height = img.height;

				if (width > maxWidth)	{ height = height * (maxWidth / width);	width = maxWidth; }
				if (height > maxHeight)	{ width = width * (maxHeight / height);	height = maxHeight; }
				const canvas = document.createElement("canvas");
				canvas.width = width;
				canvas.height = height;
				const ctx = canvas.getContext("2d");
				ctx.drawImage(img, 0, 0, width, height);
				canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.9);
			};
			img.src = URL.createObjectURL(file);
		});
	}
	function jpegToBase64(file) {
		return new Promise((resolve) => {
			const reader = new FileReader();
			reader.onload = () => resolve(reader.result); // Base64文字列
			reader.readAsDataURL(file);
		});
	}
	async function createPanoramaViewer(base64, fileHandle, geometryType) {
		try {
			const writable = await fileHandle.createWritable();
			writable.write(
`<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<title></title>
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<script type="importmap">
	{
	  "imports": {
		"three": "https://unpkg.com/three@0.164.0/build/three.module.js",
		"three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
	  }
	}
	<\/script>
	<style>
		html, body { margin: 0; overflow: hidden; height: 100%; }
		#canvas { height: 100%; }
	</style>
</head>
<body>
	<div id="canvas"></div>
  
	<script type="module">
		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

		function createCylinder(texture) {
			const radius = 1;
			const height = (2*Math.PI*radius)/(texture.image.width/texture.image.height);
			const geo = new THREE.CylinderGeometry(radius, radius, height, 64, 1, true);
			const mat = new THREE.MeshBasicMaterial({map: texture, side: THREE.BackSide});
			return new THREE.Mesh(geo, mat);
		}
		function createSphere(texture) {
			const radius = 1;
			const geo = new THREE.SphereGeometry(radius, 64, 32);
			const mat = new THREE.MeshBasicMaterial({map: texture, side: THREE.BackSide});
			const mesh = new THREE.Mesh(geo, mat);
			const texAspect = texture.image.width/texture.image.height;
			const sphereAspect = 2;
			mesh.scale.set(texAspect/sphereAspect, 1, 1);
			return mesh;
		}
		const scene = new THREE.Scene();
		const texture = new THREE.TextureLoader().load('${base64}', () => {
			const mesh = create${geometryType}(texture);
			scene.add(mesh);
		});
		const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
		camera.position.set(0, 0, 0.1);

		const renderer = new THREE.WebGLRenderer();
		renderer.setSize(window.innerWidth, window.innerHeight);
		document.getElementById('canvas').appendChild(renderer.domElement);

		const orbitControls = new OrbitControls(camera,renderer.domElement);
		function update() {
			orbitControls.update();
			requestAnimationFrame(update);
			renderer.render(scene, camera);
		}
		window.addEventListener("resize", () => {
			camera.aspect = window.innerWidth/window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.setSize(window.innerWidth, window.innerHeight);
			update();
		});

		update();
	<\/script>
</body>
</html>`
			);
			await writable.close();
		}
		catch (ex) { console.log(ex.message); }
	}

	let base64 = null;
	const imageFile = document.getElementById('imageFile');
	const saveFileCylinder = document.getElementById('saveFileCylinder');
	const saveFileSphere = document.getElementById('saveFileSphere');
	const saveDiv = document.getElementById('saveDiv');
	imageFile.addEventListener('change', async () => {
		const resolution = document.querySelector('input[name="resolution"]:checked');
		console.log(resolution.value);
		const file = imageFile.files[0];
		const orgSize = await getImageSize(file);
		const resized = await resizeImage(file, Number(resolution.value), Number(resolution.value)/2);
		const resizedSize = await getImageSize(resized);
		base64 = await jpegToBase64(resized);
		saveEndDiv.classList.add("hidden");
		saveDiv.classList.remove("hidden");
		imageFile.value = "";
	});
	saveFile.addEventListener('click', async () => {
		const geometry = document.querySelector('input[name="geometry"]:checked');
		const fileHandle = await window.showSaveFilePicker({suggestedName: "panorama.html"});
		await createPanoramaViewer(base64, fileHandle, geometry.value);
		console.log(geometry.value);
		saveDiv.classList.add("hidden");
		saveEndDiv.classList.remove("hidden");
	});
	</script>
	</body>
</html>
