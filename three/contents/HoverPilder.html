<!DOCTYPE html>
<html>
	<head>
		<title>HoverPilder</title>
		<style>
			#canvas		{ position: absolute; top: 0px; left: 0px; z-index: 0; }
			#control	{ position: absolute; top: 10px; left: 10px; z-index: 1; }
		</style>
	</head>
	<body>
		<div id="control">
			<button id="start">Start</button>&nbsp;<button id="stop">Stop</button>&nbsp;&nbsp;
			<input id="angle" type="range" min="0" max="1.8" step="0.001" style="width: 360px;" value="0">
		</div> 
		<div id="canvas" style="width: 100%; height: 100%;"></div>
		<script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
		<script src="https://unpkg.com/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
		<script src="ThreeUtil.js"></script>
		<script>
			const canvas = document.querySelector('#canvas');
			function getWidth()  { return canvas.getBoundingClientRect().width; }
			function getHeight() { return canvas.getBoundingClientRect().height; }

			let threeUtil = null;
			let controls = null;
			function animate() {
				requestAnimationFrame(animate);
				animateEx();
				if (controls != null)  { controls.update(); }
				if (threeUtil != null) { threeUtil.update(); }
			}

			let leftBlades	= null;
			let rightBlades	= null;
			let leftWing	= null;
			let rightWing	= null;

			let running = false;
			let speed = 0;
			function animateEx() {
				if (leftBlades == null || rightBlades == null) { return; }
				
				speed += (running)?0.002:-0.002;
				if (speed > 0.5) { speed = 0.5; } else if (speed < 0) { speed = 0; }
				leftBlades .rotation.set(0, leftBlades .rotation.y - speed, 0);
				rightBlades.rotation.set(0, rightBlades.rotation.y + speed, 0);
			}


			canvas.addEventListener('dragover', (ev) => ev.preventDefault());
			
			while (canvas.firstChild) { canvas.removeChild(canvas.firstChild); }
			threeUtil = new ThreeUtil(`
{
	"camera": {
		"type": "PerspectiveCamera", "fov": 75, "aspect": 1,
		"near": 1, "far": 1000, "position": { "x": 0, "y": 0, "z": 40 }, "lookAt": { "x": 0, "y": 0, "z": 0 }
	},
	"geometryInventory": [ ],
	"materialInventory": [
		{ "name": "M_Blade", "type": "MeshStandard", "color": "#808080", "metalness": 0.2, "roughness": 0.5 },
		{ "name": "M_Shaft", "type": "MeshStandard", "color": "#404040", "metalness": 0.4, "roughness": 0.5 },
		{ "name": "M_Base",  "type": "MeshStandard", "color": "#ff0000", "metalness": 0.6, "roughness": 0.3 },
		{ "name": "M_Glass", "type": "MeshStandard", "color": "#d0d0ff", "metalness": 0.6, "roughness": 0.3, "transparent": true, "opacity": 0.5 },
		{ "name": "M_Jet",   "type": "MeshStandard", "color": "#f8f5ea", "metalness": 0.8, "roughness": 0.1 }
	],
	"objectInventory": [
		{ "name": "O_Blade", "type": "Mesh",
			"geometry": { "type": "Box", "width": 17, "height": 3, "depth": 0.2 },
			"material": { "type": "Link", "linkTo": "M_Blade" }
		},
		{ "name": "O_LeftBlade",  "type": "Link", "linkTo": "O_Blade", "rotation": { "x": -1.3, "y": 0, "z": 0 } },
		{ "name": "O_RightBlade", "type": "Link", "linkTo": "O_Blade", "rotation": { "x":  1.3, "y": 0, "z": 0 } },
		{ "name": "O_Shaft", "type": "Mesh",
			"geometry": { "type": "Capsule", "radius": 3, "height": 4, "radialSegments": 64 },
			"material": { "type": "Link", "linkTo": "M_Shaft" },
			"position": { "x": 0, "y": 1.5, "z": 0 }
		},
		{ "name": "O_LeftBlades", "type": "Group",
			"children": [
				{ "type": "Group", "children": [ { "type": "Link", "linkTo": "O_LeftBlade" } ], "rotation": { "x": 0, "y":  0,    "z": 0 }, "position": { "x": -6, "y": 0, "z":  0 } },
				{ "type": "Group", "children": [ { "type": "Link", "linkTo": "O_LeftBlade" } ], "rotation": { "x": 0, "y":  1.57, "z": 0 }, "position": { "x":  0, "y": 0, "z":  6 } },
				{ "type": "Group", "children": [ { "type": "Link", "linkTo": "O_LeftBlade" } ], "rotation": { "x": 0, "y":  3.14, "z": 0 }, "position": { "x":  6, "y": 0, "z":  0 } },
				{ "type": "Group", "children": [ { "type": "Link", "linkTo": "O_LeftBlade" } ], "rotation": { "x": 0, "y": -1.57, "z": 0 }, "position": { "x":  0, "y": 0, "z": -6 } },
				{ "type": "Link", "linkTo": "O_Shaft" }
			]
		},
		{ "name": "O_RightBlades", "type": "Group",
			"children": [
				{ "type": "Group", "children": [ { "type": "Link", "linkTo": "O_RightBlade" } ], "rotation": { "x": 0, "y":  0,    "z": 0 }, "position": { "x": -6, "y": 0, "z":  0 } },
				{ "type": "Group", "children": [ { "type": "Link", "linkTo": "O_RightBlade" } ], "rotation": { "x": 0, "y":  1.57, "z": 0 }, "position": { "x":  0, "y": 0, "z":  6 } },
				{ "type": "Group", "children": [ { "type": "Link", "linkTo": "O_RightBlade" } ], "rotation": { "x": 0, "y":  3.14, "z": 0 }, "position": { "x":  6, "y": 0, "z":  0 } },
				{ "type": "Group", "children": [ { "type": "Link", "linkTo": "O_RightBlade" } ], "rotation": { "x": 0, "y": -1.57, "z": 0 }, "position": { "x":  0, "y": 0, "z": -6 } },
				{ "type": "Link", "linkTo": "O_Shaft" }
			]
		},
		{ "name": "O_BladesTop", "type": "Group",
			"children": [
				{ "type": "Mesh",
					"geometry": { "type": "Lathe", "points": [{ "x": 18, "y": -2 }, { "x": 16, "y": 2 }, { "x": 15, "y": 2 }, { "x": 17, "y": -2 }, { "x": 18, "y": -2 }], "segments": 64 },
					"material": { "type": "Link", "linkTo": "M_Shaft" }
				},
				{ "type": "Mesh",
					"geometry": { "type": "Cylinder", "radiusTop": 4, "radiusBottom": 4, "height": 3, "radialSegments": 64 },
					"material": { "type": "Link", "linkTo": "M_Base" },
					"position": { "x": 0, "y": 5, "z": 0 }
				}

			]
		},
		{ "name": "O_WingJoint", "type": "Mesh",
			"geometry": { "type": "Cylinder", "radiusTop": 2, "radiusBottom": 2, "height": 18, "radialSegments": 64 },
			"material": { "type": "Link", "linkTo": "M_Base" },
			"rotation": { "x": -1.57, "y": 0, "z": 0 }
		},
		{
			"name": "O_Jet", "type": "Group",
			"children": [
				{
					"type": "Mesh",
					"geometry": { "type": "Cylinder", "radiusTop": 5, "radiusBottom": 5, "height": 20, "radialSegments": 64 },
					"material": { "type": "Link", "linkTo": "M_Jet" }
				},
				{
					"type": "Mesh",
					"geometry": { "type": "Sphere", "radius": 5, "widthSegments": 64, "heightSegments": 32 },
					"material": { "type": "Link", "linkTo": "M_Jet" },
					"scale": { "x": 1, "y": 3, "z": 1 },
					"position": { "x": 0, "y": 10, "z": 0 }
				}
			],
			"rotation": { "x":-1.57, "y":0, "z": 0 }
		}
	],
	"objects": [
		{ "name": "HoverPilder", "type": "Group",
			"children": [
				{ "name": "LeftWing", "type": "Group",
					"children": [
						{ "type": "Group",
							"children": [ { "type": "Group", "children": [ { "name": "LeftBlades", "type": "Link", "linkTo": "O_LeftBlades" }, { "type": "Link", "linkTo": "O_BladesTop" } ] } ],
							"position": { "x": -40, "y": -4, "z": 0 }
						},
						{ "type": "Mesh",
							"geometry": { "type": "Extrude", "shape": "M0,3 L40,15 L40,-2 L0,-2", "options": { "steps": 1, "depth": 2, "bevelEnabled": false } },
							"material": { "type": "Link", "linkTo": "M_Base" },
							"rotation": { "x": -1.57, "y": 0, "z": 0 },
							"position": { "x": -40, "y": 0, "z": 0 }
						}
					],
					"position": { "x": -40, "y": 4, "z": 0 }
				},
				{ "name": "RightWing", "type": "Group",
					"children": [
						{ "type": "Group",
							"children": [ { "type": "Group", "children": [ { "name": "RightBlades", "type": "Link", "linkTo": "O_RightBlades" }, { "type": "Link", "linkTo": "O_BladesTop" } ] } ],
							"position": { "x": 40, "y": -4, "z": 0 }
						},
						{ "type": "Mesh",
							"geometry": { "type": "Extrude", "shape": "M0,3 L-40,15, L-40,-2 L0,-2", "options": { "steps": 1, "depth": 2, "bevelEnabled": false } },
							"material": { "type": "Link", "linkTo": "M_Base" },
							"rotation": { "x": -1.57, "y": 0, "z": 0 },
							"position": { "x": 40, "y": 0, "z": 0 }
						}
					],
					"position": { "x": 40, "y": 4, "z": 0 }
				},
				{ "name": "Base", "type": "Group",
					"children": [
						{ "type": "Mesh",
							"geometry": { "type": "Extrude", "shape": "M-40,15 L0,20 L40,15 L40,-2 L-40,-2 Z", "options": { "steps": 1, "depth": 2, "bevelEnabled": false } },
							"material": { "type": "Link", "linkTo": "M_Base" },
							"rotation": { "x": -1.57, "y": 0, "z": 0 },
							"position": { "x": 0, "y": 4, "z": 0 }
						},
						{ "type": "Link", "linkTo": "O_WingJoint", "position": { "x": -40, "y": 5, "z": -6.5 } },
						{ "type": "Link", "linkTo": "O_WingJoint", "position": { "x":  40, "y": 5, "z": -6.5 } },
						{ "type": "Link", "linkTo": "O_Jet", "position": { "x": -13, "y": 11.5, "z": 2 } },
						{ "type": "Link", "linkTo": "O_Jet", "position": { "x":  13, "y": 11.5, "z": 2 } }
					]
				},
				{ "name": "Body", "type": "Group",
					"children": [
						{ "type": "Mesh",
							"geometry": { "type": "Cylinder", "radiusTop": 20, "radiusBottom": 5, "height": 32, "radialSegments": 64 },
							"material": { "type": "Link", "linkTo": "M_Base" },
							"rotation": { "x": -1.57, "y": 0, "z": 0 },
							"position": { "x": 0, "y": 0, "z": 11 }
						},
						{ "type": "Mesh",
							"geometry": { "type": "Cylinder", "radiusTop": 18, "radiusBottom": 20, "height": 20, "radialSegments": 64 },
							"material": { "type": "Link", "linkTo": "M_Base" },
							"rotation": { "x": -1.57, "y": 0, "z": 0 },
							"position": { "x": 0, "y": 0, "z": -15 }
						},
						{ "type": "Mesh",
							"geometry": { "type": "Sphere", "radius": 14, "widthSegments": 64, "heighSegments": 32 },
							"material": { "type": "Link", "linkTo": "M_Glass" },
							"scale": { "x": 1, "y": 1, "z": 1.2 },
							"rotation": { "x": 0, "y": 0, "z":   0 },
							"position": { "x": 0, "y": 0, "z": -25 }
						},
						{ "type": "Mesh",
							"geometry": { "type": "Sphere", "radius": 18, "widthSegments": 64, "heightSegments": 32, "thetaStart": 1.57, "thetaLength": 3.14 },
							"material": { "type": "Link", "linkTo": "M_Base" },
							"scale": { "x": 1, "y": 1, "z": 1.2 },
							"rotation": { "x": 0, "y": 0, "z": 0 },
							"position": { "x": 0, "y": 0, "z": -23 }
						},
						{ "type": "Mesh",
							"geometry": { "type": "Ring", "outerRadius": 18, "thetaSegments": 64, "phiSegments": 32 },
							"material": { "type": "Link", "linkTo": "M_Base" },
							"scale": { "x": 1, "y": 1.2, "z": 1 },
							"rotation": { "x": -1.57, "y": 0, "z": 0 },
							"position": { "x": 0, "y": 0, "z": -23 }
						},
						{ "type": "Mesh",
							"geometry": { "type": "Extrude", "shape": "M-5,0 L11,20 L52,24 Q19,13 27,0 Z", "options": { "steps": 1, "depth": 2, "bevelEnabled": false } },
							"material": { "type": "Link", "linkTo": "M_Base" },
							"rotation": { "x": 0, "y": -1.57, "z": 0 },
							"position": { "x": 0, "y": 4, "z": 0 }
						},
						{ "type": "Mesh",
							"geometry": { "type": "Extrude",
								"shape": "M-15,-5 L15,-5 C4,-5 4,5 10,7 L-10,7 C-4,5 -4,-5 -15,-5 Z",
								"options": { "steps": 1, "depth": 20, "bevelEnabled": false }
							},
							"material": { "type": "Link", "linkTo": "M_Base" },
							"position": { "x": 0, "y": -22, "z": -26 }
						}
					],
					"position": { "x": 0, "y": 32, "z": 8 }
				}
			],
			"rotation": { "x": 0, "y": 1.57, "z": 0 },
			"scale": { "x": 0.3, "y": 0.3, "z": 0.3 }
		}
	]
}
			`);
			threeUtil.setSize(getWidth(), getHeight());
			
			leftBlades	= threeUtil.getObject("LeftBlades");
			rightBlades	= threeUtil.getObject("RightBlades");
			leftWing	= threeUtil.getObject("LeftWing");
			rightWing	= threeUtil.getObject("RightWing");
			
			const domElement = threeUtil.getRenderer().domElement;
			canvas.appendChild(domElement);
			controls = new THREE.OrbitControls(threeUtil.getCamera(), domElement);
			Object.assign(controls, {
				rotateSpeed: 0.5, enableDamping: true, dampingFactor: 0.05,
				minPolarAngle: 0, maxPolarAngle: Math.PI, minAzimuthAngle: -Infinity, maxAzimuthAngle: Infinity
			});

			document.querySelector('#start')	.addEventListener('click', () => running = true);
			document.querySelector('#stop')		.addEventListener('click', () => running = false);

			const angle = document.querySelector('#angle');
			angle.addEventListener('input', () => {
				leftWing .rotation.set(0, 0, -angle.value);
				rightWing.rotation.set(0, 0,  angle.value);
			});

			animate();
		</script>
	</body>
</html>
