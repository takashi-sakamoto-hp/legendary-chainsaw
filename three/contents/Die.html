<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="Author" content="Sakamoto Takashi">
		<title>Die</title>
		<style>
		body		{ font-size: 120%; }
		#control	{ position: absolute; top: 5px; left: 5px; z-index: 1; }
		#canvas		{ position: absolute; top: 0px; left: 0px; z-index: 0; }
		</style>
	</head>
	<body>
		<div id="control">
		</div> 
		<div id="canvas" style="width: 100%; height: 100%;"></div>
<!--
		<div id="canvas" style="width: 100px; height: 100px;"></div>
-->
		<script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
		<script src="https://unpkg.com/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
		<script>

		class Die {
			#object;
			createObject() {
				const size = 10;
				function createFace(no = 1) {
					const face = new THREE.Group();
					const shape = new THREE.Shape();
					shape.moveTo(-size/2, -size/2);
					shape.lineTo( size/2, -size/2);
					shape.lineTo( size/2,  size/2);
					shape.lineTo(-size/2,  size/2);
					shape.lineTo(-size/2, -size/2);
					const holePos = [
						[                                                   [0, 0]                                                     ],
						[[size/4, size/4],                                                                           [-size/4, -size/4]],
						[[size/4, size/4],                                  [0, 0],                                  [-size/4, -size/4]],
						[[size/4, size/4], [ size/4, -size/4],                                    [-size/4, size/4], [-size/4, -size/4]],
						[[size/4, size/4], [ size/4, -size/4],              [0, 0],               [-size/4, size/4], [-size/4, -size/4]],
						[[size/4, size/4], [ size/4, -size/4], [size/4, 0],         [-size/4, 0], [-size/4, size/4], [-size/4, -size/4]],
					];
					holePos[no-1].forEach((p) => {
						const holePath = new THREE.Path();
						holePath.absarc(p[0], p[1], size/10, 0, Math.PI*2, false);
						shape.holes.push(holePath);
					});
					const geometry = new THREE.ShapeGeometry(shape, 64);
					const material = new THREE.MeshStandardMaterial({color: 0xffffff});
					const face1 = new THREE.Mesh(geometry, material);
					face.add(face1);
					
					const hemiGeom = new THREE.SphereGeometry(size/10, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2);
					const hemiMat = new THREE.MeshStandardMaterial({color: 0x000000, side: THREE.BackSide, metalness: 0.6, roughness: 0.3});
					holePos[no-1].forEach((p) => {
						const hemi = new THREE.Mesh(hemiGeom, hemiMat);
						hemi.rotation.x = -Math.PI/2;
						hemi.position.set(p[0], p[1], 0);
						face.add(hemi);
					});
					return face;
				}
				const box = new THREE.Group();
				const face1 = createFace(1);
				face1.position.z = size/2;
				box.add(face1);
				const face2 = createFace(6);
				face2.rotation.x = Math.PI;
				face2.position.z = -size/2;
				box.add(face2);
				const face3 = createFace(2);
				face3.rotation.y = -Math.PI/2;
				face3.position.x = -size/2;
				box.add(face3);
				const face4 = createFace(5);
				face4.rotation.y = Math.PI/2;
				face4.position.x = size/2;
				box.add(face4);
				const face5 = createFace(3);
				face5.rotation.x = -Math.PI/2;
				face5.position.y = size/2;
				box.add(face5);
				const face6 = createFace(4);
				face6.rotation.x = Math.PI/2;
				face6.position.y = -size/2;
				box.add(face6);
				return box;
			}
			constructor() {
				this.#object = this.createObject();
			}
			animate() {
			}
			getObject() { return this.#object; }
		}

		const canvas = document.querySelector('#canvas');
		function getWidth()  { return canvas.getBoundingClientRect().width; }
		function getHeight() { return canvas.getBoundingClientRect().height; }
		const scene = new THREE.Scene();
		const directionLight = new THREE.DirectionalLight(0xffffff, 1);
		directionLight.position.set(1, 1, 1);
		directionLight.target.position.set(0, 0, 0);
		scene.add(directionLight);
		scene.add(new THREE.AmbientLight(0x999999, 1));
		const die = new Die();
		scene.add(die.getObject());
		const renderer = new THREE.WebGLRenderer();
		renderer.setSize(getWidth(), getHeight());
		renderer.setClearColor(0xdddddd);
		canvas.appendChild(renderer.domElement);
		const camera = new THREE.PerspectiveCamera(60, getWidth()/getHeight(), 0.1, 1000);
		camera.position.set(0, 0, 30);
		const controls = new THREE.OrbitControls(camera, renderer.domElement);
		Object.assign(controls, {rotateSpeed: 0.5, enableDamping: true, dampingFactor: 0.05});
		controls.target = new THREE.Vector3(0, 0, 0);
		function animate() {
			renderer.setSize(getWidth(), getHeight());
			requestAnimationFrame(animate);
			controls.update();
			die.animate();
			renderer.render(scene, camera);
		}
		animate();
		</script>
	</body>
</html>
