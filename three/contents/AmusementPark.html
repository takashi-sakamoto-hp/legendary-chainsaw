<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="Author" content="Sakamoto Takashi">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Amusement park(twilight)</title>
		<style>
		body			{ font-size: 120%; }
		#droneControl	{ position: absolute; top: 5px; right: 10px; z-index: 2; }
		#control		{ position: absolute; top: 5px; left:   5px; z-index: 1; }
		#canvas			{ position: absolute; top: 0px; left:   0px; z-index: 0; }
		th				{ text-align: left; }
		td				{ padding: 5px; }
		button			{ font-size: 90%; margin-left: 15px; }

		#iSpeed			{ width: 100%; }

		</style>
	</head>
	<body>
		<div id="control">
			<details>
				<summary>全般設定</summary>
				<table>
					<tr>
						<th>スピード</th>
						<td>
							<span class="slider-container" style="display: inline-block">
								<input id="iSpeed" type="range" min="-10" max="20" step="1" value="1" list="tickmarks">
								<div class="ticks"><span>-10</span><span>0</span><span>10</span><span>20</span></div>
							</span>
							<button id="bStop">Stop</button>
						</td>
					</tr>
					<tr>
						<th>カメラ</th>
						<td>
							<input type="radio" id="fix"    value="fix"    name="camera" checked><label for="fix"   >フリー</label>
							<input type="radio" id="ferris" value="ferris" name="camera"        ><label for="ferris">観覧車</label>
							<input type="radio" id="merry"  value="merry"  name="camera"        ><label for="merry" >メリーゴーラウンド</label>
							<input type="radio" id="coffee" value="coffee" name="camera"        ><label for="coffee">コーヒーカップ</label>
							<input type="radio" id="train"  value="train"  name="camera"        ><label for="train" >列車</label>
							<input type="radio" id="drone"  value="drone"  name="camera"        ><label for="drone" >ドローン</label>
						</td>
					</tr>
					<tr>
						<th>時間</th>
						<td>
							<input type="radio" id="noon"    value="noon"    name="daypart" 　　　  ><label for="fix"   >昼</label>
							<input type="radio" id="evening" value="evening" name="daypart" checked><label for="ferris">夕</label>
							<input type="radio" id="night"   value="night"   name="daypart"        ><label for="merry" >夜</label>
						</td>
					</tr>
				</table>
			</details>
		</div>
		<div id="droneControl">
			<details>
				<summary>ドローン</summary>
				<table>
					<tr><th>前</th><td><input id="droneFB" type="range" min="-2" max="2" step="1" value="0"></td><th>後</th></tr>
					<tr><th>左</th><td><input id="droneLR" type="range" min="-1" max="1" step="1" value="0"></td><th>右</th></tr>
					<tr><th>上</th><td><input id="droneUD" type="range" min="-1" max="1" step="1" value="0"></td><th>下</th></tr>
				</table>
			</details>
		</div>
		<div id="canvas" style="width: 100%; height: 100%;"></div>
<!--
		<div id="canvas" style="width: 256px; height: 144px;"></div>
-->
		<script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
		<script src="https://unpkg.com/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
		<script>
		class Attraction {
			static #geometryMap = new Map();
			getGeometry(key) { return Attraction.#geometryMap.get(key); }
			hasGeometry(key) { return Attraction.#geometryMap.has(key); }
			setGeometry(key, geometry) { Attraction.#geometryMap.set(key, geometry); }
			
			static #materialMap = new Map();
			getMaterial(key) { return Attraction.#materialMap.get(key); }
			hasMaterial(key) { return Attraction.#materialMap.has(key); }
			setMaterial(key, material) { Attraction.#materialMap.set(key, material); }

			getPoints(pointArray) {
				const points = [];
				pointArray.forEach(([x,y]) => points.push(new THREE.Vector2(x, y)));
				return points;
			}
			getPath(pathStr, path = null) {
				let elem = pathStr.match(/[A-Za-z]|-?\d+(\.\d+)?/g);
				if (elem.length == 0) { throw new Error(); }
				if (path == null) { path = new THREE.Path(); }
				let index = 0;
				while (index < elem.length) {
					let token = elem[index++];
					switch (token) {
					case 'M':
						if (index + 2 > elem.length) { throw new Error(); }
						path.moveTo(Number(elem[index]), Number(elem[index+1]));
						index += 2;
						break;
					case 'L':
						if (index + 2 > elem.length) { throw new Error(); }
						path.lineTo(Number(elem[index]), Number(elem[index+1]));
						index += 2;
						break;
					case 'Q':
						if (index + 4 > elem.length) { throw new Error(); }
						path.quadraticCurveTo(
							Number(elem[index]),   Number(elem[index+1]),
							Number(elem[index+2]), Number(elem[index+3]));
						index += 4;
						break;
					case 'C':
						if (index + 6 > elem.length) { throw new Error(); }
						path.bezierCurveTo(
							Number(elem[index]),   Number(elem[index+1]),
							Number(elem[index+2]), Number(elem[index+3]),
							Number(elem[index+4]), Number(elem[index+5]));
						index += 6;
						break;
					case 'Z':
						path.closePath();
						break;
					default:
						console.log('ignore: ' + token);
						break;
					}
				}
				return path;
			}
			getCurveXYZ(pathStr) {
				function getVector3(ary, index) { return new THREE.Vector3(Number(ary[index]), Number(ary[index+1]), Number(ary[index+2])); }
				let elem = pathStr.match(/[A-Za-z]|-?\d+(\.\d+)?/g);
				if (elem.length == 0) { throw new Error(); }
				const curve = new THREE.CurvePath();
				let index = 0;
				const ssp = new THREE.Vector3(0, 0, 0);
				let sp = ssp; 
				while (index < elem.length) {
					let token = elem[index++];
					switch (token) {
						case 'M': {
							if (index + 3 > elem.length) { throw new Error(); }
							sp = getVector3(elem, index);
							index += 3;
						}
						break;
						
						case 'L': {
							if (index + 3 > elem.length) { throw new Error(); }
							const ep = getVector3(elem, index);
							curve.add(new THREE.LineCurve3(sp, ep));
							sp = ep;
							index += 3;
						}
						break;
							
						case 'Q': {
							if (index + 6 > elem.length) { throw new Error(); }
							const ep = getVector3(elem, index+3);
							curve.add(new THREE.QuadraticBezierCurve3(sp, getVector3(elem, index), ep));
							sp = ep;
							index += 6;
						}
						break;
							
						case 'C': {
							if (index + 9 > elem.length) { throw new Error(); }
							const ep  = getVector3(elem, index+6);
							curve.add(new THREE.CubicBezierCurve3(sp, getVector3(elem, index), getVector3(elem, index+3), ep));
							sp = ep;
							index += 9;
						}
						break;
							
						case 'Z':
							curve.add(new THREE.LineCurve3(sp, ssp));
							break;
						
						default:
							console.log('ignore: ' + token);
							break;
					}
				}
				return curve;
			}
			getCurveXZ(pathStr) {
				function getVector3(ary, index) { return new THREE.Vector3(Number(ary[index]), 0, Number(ary[index+1])); }
				let elem = pathStr.match(/[A-Za-z]|-?\d+(\.\d+)?/g);
				if (elem.length == 0) { throw new Error(); }
				const curve = new THREE.CurvePath();
				let index = 0;
				const ssp = new THREE.Vector3(0, 0, 0);
				let sp = ssp; 
				while (index < elem.length) {
					let token = elem[index++];
					switch (token) {
						case 'M': {
							if (index + 2 > elem.length) { throw new Error(); }
							sp = getVector3(elem, index);
							index += 2;
						}
						break;
						
						case 'L': {
							if (index + 2 > elem.length) { throw new Error(); }
							const ep = getVector3(elem, index);
							curve.add(new THREE.LineCurve3(sp, ep));
							sp = ep;
							index += 2;
						}
						break;
							
						case 'Q': {
							if (index + 4 > elem.length) { throw new Error(); }
							const ep = getVector3(elem, index+2);
							curve.add(new THREE.QuadraticBezierCurve3(sp, getVector3(elem, index), ep));
							sp = ep;
							index += 4;
						}
						break;
							
						case 'C': {
							if (index + 6 > elem.length) { throw new Error(); }
							const ep  = getVector3(elem, index+4);
							curve.add(new THREE.CubicBezierCurve3(sp, getVector3(elem, index), getVector3(elem, index+2), ep));
							sp = ep;
							index += 6;
						}
						break;
							
						case 'Z':
							curve.add(new THREE.LineCurve3(sp, ssp));
							break;
						
						default:
							console.log('ignore: ' + token);
							break;
					}
				}
				return curve;
			}
			squareToTriangles([p0, p1, p2, p3]) { return [p0, p1, p2, p2, p3, p0]; }
			getCaseGeometry(w, h, d, ww, hh, dd) {
				const geometry = new THREE.BufferGeometry();
				const vertices = new Float32Array([
					-w/2,		 h/2,		 d/2,
					-w/2,		-h/2,		 d/2,
					 w/2,		-h/2,		 d/2,
					 w/2,		 h/2,		 d/2,

					-w/2,		 h/2,		-d/2,
					-w/2,		-h/2,		-d/2,
					 w/2,		-h/2,		-d/2,
					 w/2,		 h/2,		-d/2,
					 
					-(w/2-ww),	 h/2,		 (d/2-dd),
					-(w/2-ww),	-(h/2-hh),	 (d/2-dd),
					 (w/2-ww),	-(h/2-hh),	 (d/2-dd),
					 (w/2-ww),	 h/2,	 	 (d/2-dd),

					-(w/2-ww),	 h/2,		-(d/2-dd),
					-(w/2-ww),	-(h/2-hh),	-(d/2-dd),
					 (w/2-ww),	-(h/2-hh),	-(d/2-dd),
					 (w/2-ww),	 h/2,		-(d/2-dd)
				]);
				geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
				const squares = [
					[  0,  1,  2,  3], [  0,  4,  5,  1], [  4,  7,  6,  5], [  7,  3,  2,  6], [  2,  1,  5,  6],
					[  8, 11, 10,  9], [  8,  9, 13, 12], [ 12, 13, 14, 15], [ 15, 14, 10, 11], [ 10, 14, 13,  9],
					[ 11,  8,  0,  3], [  8, 12,  4,  0], [ 15,  7,  4, 12], [ 11,  3,  7, 15]
				];
				const tmp = [];
				squares.forEach((square) => tmp.push(...this.squareToTriangles(square)));
				const indices = new Uint16Array(tmp);
				geometry.setIndex(new THREE.BufferAttribute(indices, 1));
				geometry.computeVertexNormals();
				return geometry;
			}
			constructor() {
				if (new.target === Attraction) { throw new Error('Cannot instansiate Attraction'); }
				
				this.setGeometry('Box',			new THREE.BoxGeometry(1, 1, 1));
				this.setGeometry('Sphere',		new THREE.SphereGeometry(1, 64, 32));
				this.setGeometry('Cylinder',	new THREE.CylinderGeometry(1, 1, 1, 64));
				this.setGeometry('Circle',		new THREE.CircleGeometry(1, 64));

				this.setMaterial('MetalBlack',	new THREE.MeshStandardMaterial({color: 0x202020, emissive: 0x404040, metalness: 0.5}));
				this.setMaterial('White',		new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0x606060, metalness: 0.2, roughness: 0.8}));
				
				this.setMaterial('Red',			new THREE.MeshStandardMaterial({color: 0xff6060, emissive: 0x600000, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('Green',		new THREE.MeshStandardMaterial({color: 0x60ff60, emissive: 0x006000, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('Blue',		new THREE.MeshStandardMaterial({color: 0x6060ff, emissive: 0x000060, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('Yellow',		new THREE.MeshStandardMaterial({color: 0xdddd60, emissive: 0x505000, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('Mazenta',		new THREE.MeshStandardMaterial({color: 0xdd60dd, emissive: 0x500050, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('Cyan',		new THREE.MeshStandardMaterial({color: 0x60dddd, emissive: 0x005050, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('Gray',		new THREE.MeshStandardMaterial({color: 0x666666, emissive: 0x404040, metalness: 0.2, roughness: 0.5}));
				
				this.setMaterial('LiteRed',		new THREE.MeshStandardMaterial({color: 0xffb0b0, emissive: 0x604040, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('LiteGreen',	new THREE.MeshStandardMaterial({color: 0xb0ffb0, emissive: 0x406040, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('LiteBlue',	new THREE.MeshStandardMaterial({color: 0xb0b0ff, emissive: 0x404060, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('LiteYellow',	new THREE.MeshStandardMaterial({color: 0xffff80, emissive: 0x505030, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('LiteMazenta',	new THREE.MeshStandardMaterial({color: 0xff80ff, emissive: 0x503050, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('LiteCyan',	new THREE.MeshStandardMaterial({color: 0x60ffff, emissive: 0x305050, metalness: 0.5, roughness: 0.2}));
				this.setMaterial('LiteGray',	new THREE.MeshStandardMaterial({color: 0x888888, emissive: 0x606060, metalness: 0.2, roughness: 0.5}));

				this.setMaterial('Ferris1',		new THREE.MeshStandardMaterial({color: 0x6a4820, emissive: 0x503010, metalness: 0, roughness: 1}));
				this.setMaterial('Merry1',		new THREE.MeshStandardMaterial({color: 0x606040, emissive: 0x303010, metalness: 0.1, roughness: 0.5}));
				this.setMaterial('Merry2',		new THREE.MeshStandardMaterial({color: 0x604060, emissive: 0x301030, metalness: 0.1, roughness: 0.5}));
				this.setMaterial('Merry3',		new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0x606060, metalness: 0.1, roughness: 0.5, transparent: true, opacity: 0.5}));
				this.setMaterial('Merry4',		new THREE.MeshStandardMaterial({color: 0x406060, emissive: 0x103030, metalness: 0.1, roughness: 0.5, transparent: true, opacity: 0.9}));
				this.setMaterial('Coffee1', 	new THREE.MeshStandardMaterial({color: 0x808060, emissive: 0x303020, metalness: 0.1, roughness: 0.8}));

			}
			getObject() { throw new Error('getObject() must be implemented in sub-class'); }
			getCamera() { throw new Error('getCamera() must be implemented in sub-class'); }
			setPosition(x, y, z) {
				const box = new THREE.Box3().setFromObject(this.getObject());
				const size = new THREE.Vector3();
				box.getSize(size);
				const center = new THREE.Vector3();
				box.getCenter(center);
				this.getObject().position.set(x, y - center.y + size.y/2, z);
			}
			animate(speed = 1) { throw new Error('animate(speed) must be implemented in sub-class'); }
		}
		</script>
		<script>
		class FerrisWheel extends Attraction {
			getPanel1Geometry() {
				const key = 'FerrisWheel:Panel1';
				if (!super.hasGeometry(key)) {
					super.setGeometry(key, new THREE.LatheGeometry(super.getPath('M1,0.03 L0.8,0.03 L0.8,-0.03 L1,-0.03 Z').getPoints(64), 64, Math.PI*1/2, Math.PI));
				}
				return super.getGeometry(key);
			}
			getPanel2Geometry() {
				const key = 'FerrisWheel:Panel2';
				if (!super.hasGeometry(key)) {
					super.setGeometry(key, new THREE.LatheGeometry(super.getPath('M1,0.03 L0,0.03 L0,-0.03 L1,-0.03 Z').getPoints(64), 64, Math.PI*3/2, Math.PI));
				}
				return super.getGeometry(key);
			}
			getFloorGeometry() {
				const key = 'FerrisWheel:Floor';
				if (!super.hasGeometry(key)) {
					super.setGeometry(key, new THREE.LatheGeometry(super.getPath('M0.93,0.47 L0.87,0.47 L0.87,-0.47 L0.93,-0.47 Z').getPoints(64), 64, Math.PI*3/2, Math.PI));
				}
				return super.getGeometry(key);
			}
			getPanel(material) {
				const mesh = new THREE.Group();
				const cap = new THREE.Mesh(super.getGeometry('Box'), material);
				cap.scale.set(2, 0.06, 0.01);
				mesh.add(new THREE.Mesh(this.getPanel1Geometry(), material), new THREE.Mesh(this.getPanel2Geometry(), material), cap);
				return mesh;
			}
			getFloor(material) {
				const mesh = new THREE.Group();
				const cap1 = new THREE.Mesh(super.getGeometry('Box'), material);
				cap1.scale.set(0.06, 0.87, 0.01);
				cap1.position.set(0.9, 0, 0);
				const cap2 = new THREE.Mesh(super.getGeometry('Box'), material);
				cap2.scale.set(0.06, 0.87, 0.01);
				cap2.position.set(-0.9, 0, 0);
				mesh.add(new THREE.Mesh(this.getFloorGeometry(), material), cap1, cap2);
				return mesh;
			}
			getGondra(material) {
				const frontPanel = this.getPanel(material);
				frontPanel.position.set(0, 0.5, 0.85);
				const rearPanel = this.getPanel(material);
				rearPanel.position.set(0, -0.5, 0.85);
				const floor = this.getFloor(material);
				floor.position.set(0, 0, 0.85);
				const mesh = new THREE.Group();
				const pillar = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('MetalBlack'));
				pillar.scale.set(0.06, 1.5, 0.06);
				mesh.add(frontPanel, rearPanel, floor, pillar);
				mesh.rotation.x = Math.PI/2;
				return mesh;
			}
			getPillar(length) {
				const mesh = new THREE.Group();
				const edge1 = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('LiteGray'));
				edge1.scale.set(0.15, 0.15, 0.15);
				edge1.rotation.x = Math.PI/2;
				mesh.add(edge1);
				const spoke = new THREE.Mesh(super.getGeometry('Box'), super.getMaterial('LiteGray'));
				spoke.scale.set(length, 0.3, 0.15);
				spoke.position.x = length/2;
				mesh.add(spoke);
				const edge2 = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('LiteGray'));
				edge2.scale.set(0.15, 0.15, 0.15);
				edge2.rotation.x = Math.PI/2;
				edge2.position.x = length;
				mesh.add(edge2);
				return mesh;
			}
			getWheel(radius, num) {
				const mesh = new THREE.Group();
				for (let i = 0; i < num; ++i) {
					const theta = Math.PI*2/num;
					const theta1 = theta*i;
					const pillar1 = this.getPillar(radius);
					pillar1.rotation.z = theta1;
					pillar1.position.set(0, 0, 0.7);
					mesh.add(pillar1);
					const pillar2 = this.getPillar(radius);
					pillar2.rotation.z = theta1;
					pillar2.position.set(0, 0, -0.7);
					mesh.add(pillar2);
					
					const theta2 = theta*(i+1);
					const x = radius*Math.cos(theta2);
					const y = radius*Math.sin(theta2);
					const len = radius*Math.sin(theta/2)*2;
					const theta3 = -(Math.PI - theta)/2 + theta1;
					
					const pillar3 = this.getPillar(len);
					pillar3.rotation.z = theta3;
					pillar3.position.set(x, y, 0.7);
					mesh.add(pillar3);
					const pillar4 = this.getPillar(len);
					pillar4.rotation.z = theta3;
					pillar4.position.set(x, y, -0.7);
					mesh.add(pillar4);
					
					const center = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('MetalBlack'));
					center.scale.set(0.18, 2.2, 0.18);
					center.rotation.set(Math.PI/2, 0, 0);
					mesh.add(center);
				}
				return mesh;
			}
			getCap() {
				const mesh = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('Gray'));
				mesh.scale.set(0.25, 0.25, 0.25);
				mesh.rotation.x = Math.PI/2;
				return mesh;
			}
			getPole(len) {
				const mesh = new THREE.Group();
				const m1 = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('Gray'));
				m1.scale.set(0.1, len, 0.1);
				m1.position.y -= len/2;
				mesh.add(m1);
				return mesh;
			}
			getPlatform() {
				const mesh = new THREE.Group();

				const cap1 = this.getCap();
				cap1.position.z = 1;
				mesh.add(cap1);

				const cap2 = this.getCap();
				cap2.position.z = -1;
				mesh.add(cap2);

				const len = (this.wheelRadius+1.8)*1.2;
				const pillar1 = this.getPole(len);
				pillar1.rotation.set(-0.1, 0, 0.5);
				pillar1.position.z = 1;
				mesh.add(pillar1);
				
				const pillar2 = this.getPole(len);
				pillar2.rotation.set(-0.1, 0, -0.5);
				pillar2.position.z = 1;
				mesh.add(pillar2);

				const pillar3 = this.getPole(len);
				pillar3.rotation.set(0.1, 0, 0.5);
				pillar3.position.z = -1;
				mesh.add(pillar3);
				
				const pillar4 = this.getPole(len);
				pillar4.rotation.set(0.1, 0, -0.5);
				pillar4.position.z = -1;
				mesh.add(pillar4);

				const base = new THREE.Mesh(super.getGeometry('Box'), super.getMaterial('Ferris1'));
				base.scale.set(len+1, 0.5, 6);

		class MerryGoRound extends Attraction {
			getPpoiTail1Geometry() {
				const key = 'MerryGoRound:PpoiTail';
				if (!super.hasGeometry(key)) { super.setGeometry(key, new THREE.CylinderGeometry(0.12, 0.08, 1, 64, 1, false)); }
				return super.getGeometry(key);
			}
			getBaseGeometry(radius, delta) {
				const key = 'MerryGoRound:Base:(' + radius + ',' + delta + ')';
				if (!super.hasGeometry(key)) {
					const pathStr = `M${radius+delta},1 L${radius-delta},1 L${radius-delta},0 L${radius+delta},0 Z`;
					super.setGeometry(key, new THREE.LatheGeometry(super.getPath(pathStr).getPoints(64), 64));
				}
				return super.getGeometry(key);
			}
			getPpoi(m1, m2) {
				const ppoi = new THREE.Group();
				const body  = new THREE.Mesh(super.getGeometry('Sphere'), m1);
				body.scale.set(0.8, 1, 0.4); 
				body.position.set (0.0, 0.0, 0.0);

				const lEye  = new THREE.Mesh(super.getGeometry('Sphere'), m2);
				lEye.rotation.set(-0.2, -0.3, 0);
				lEye.scale.set(0.36, 0.45, 0.3);
				lEye.position.set (-0.4, 0.4, 0.2);
				const rEye  = new THREE.Mesh(super.getGeometry('Sphere'), m2);
				rEye.rotation.set(-0.2, 0.3, 0);
				rEye.scale.set(0.36, 0.45, 0.3); 
				rEye.position.set (0.4, 0.4, 0.2);
				
				const tail  = new THREE.Mesh(this.getPpoiTail1Geometry(), super.getMaterial('MetalBlack'));
				tail.position.set (0.0, -1.1, -0.1);
				const tail2 = new THREE.Mesh(super.getGeometry('Sphere'), super.getMaterial('MetalBlack'));
				tail2.position.set( 0.0, -1.6, -0.1);
				tail2.scale.set(0.08, 0.08, 0.08);
				ppoi.add(body, lEye, rEye, tail, tail2);
				return ppoi;
			}
			getHorse(m1, m2) {
				const horse = new THREE.Group();
				const ppoi = this.getPpoi(m1, m2);
				ppoi.rotation.x = -Math.PI/2;
				horse.add(ppoi);

				const pillar = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('Gray'));
				pillar.scale.set(0.1, 3, 0.1);
				pillar.position.y = -1.5;
				horse.add(pillar);
				return horse;
			}
			getLoopGroup(radius, dir, horseArray, material) {
				const mesh = new THREE.Group();
				for (let i = 0; i < horseArray.length; ++i) {
					const theta = Math.PI*2/horseArray.length;
					const x = radius*Math.cos(theta*i);
					const z = radius*Math.sin(theta*i);
					
					horseArray[i].scale.set(0.5, 0.5, 0.5);
					horseArray[i].rotation.y = (dir == 1)?-theta*i:(Math.PI-theta*i);
					horseArray[i].position.set(x, 0, z);
					mesh.add(horseArray[i]);
				}
				const base = new THREE.Mesh(this.getBaseGeometry(radius, 0.9), material);
				base.position.y = -2.5;
				mesh.add(base);
				return mesh;
			}
			getRoof(roofRadius, baseRadius, material1, material2) {
				const mesh = new THREE.Group();
				const roof = new THREE.Mesh(super.getGeometry('Cylinder'), material1);
				roof.scale.set(roofRadius, 0.1, roofRadius);
				roof.position.y = 1.6;
				mesh.add(roof);
				const base = new THREE.Mesh(super.getGeometry('Cylinder'), material2);
				base.scale.set(baseRadius, 5, baseRadius);
				base.position.y = 0.5;

				const ppoi = this.getPpoi(super.getMaterial('Yellow'), super.getMaterial('Cyan'));
				ppoi.scale.set(2.5, 2.5, 2.5);
				ppoi.rotation.set(-Math.PI/2, 0, Math.PI/2);
				ppoi.position.y = 3;
				this.merryGoRound.add(ppoi);
				this.innerHorseArray = [];
				[
					['LiteRed', 'Red'], ['LiteGreen', 'Green'], ['LiteBlue', 'Blue'], ['LiteYellow', 'Yellow'], ['LiteMazenta', 'Mazenta'], ['LiteCyan', 'Cyan']
				].forEach((materials) => { this.innerHorseArray.push(this.getHorse(super.getMaterial(materials[0]), super.getMaterial(materials[1]))); });
				this.inner = this.getLoopGroup(1.9, 1, this.innerHorseArray, super.getMaterial('Merry1'));
				this.merryGoRound.add(this.inner);
				this.outerHorseArray = [];
				[
					['LiteRed', 'Red'], ['LiteGreen', 'Green'], ['LiteBlue', 'Blue'], ['LiteYellow', 'Yellow'], ['LiteMazenta', 'Mazenta'], ['LiteCyan', 'Cyan'],
					['LiteRed', 'Red'], ['LiteGreen', 'Green'], ['LiteBlue', 'Blue'], ['LiteYellow', 'Yellow'], ['LiteMazenta', 'Mazenta'], ['LiteCyan', 'Cyan']
				].forEach((materials) => { this.outerHorseArray.push(this.getHorse(super.getMaterial(materials[0]), super.getMaterial(materials[1]))); });
				this.outer = this.getLoopGroup(3.8, -1, this.outerHorseArray, super.getMaterial('Merry2'));
				this.merryGoRound.add(this.outer);
				this.camera = new THREE.PerspectiveCamera(60, getWidth()/getHeight(), 0.01, 1000);
				this.camera.position.set(0, 0.7, -0.2);
				this.outerHorseArray[0].add(this.camera);
			}
			getObject() { return this.merryGoRound; }
			getCamera() { return this.camera; }
			animate(speed = 1) {
				this.inner.rotation.y += speed*2.5/1000;
				this.outer.rotation.y -= speed*2/1000;
				this.innerHorseArray.forEach((horse) => { horse.position.y = Math.sin(horse.rotation.y*2+this.inner.rotation.y*6)/2.3-0.5; });
				this.outerHorseArray.forEach((horse) => { horse.position.y = Math.sin(horse.rotation.y*2+this.outer.rotation.y*6)/2.3-0.5; });
			}
		}

		<script>
		class CoffeeCup extends Attraction {
			getCupGeometry() {
				const key = 'CoffeeCup:Cup';
				if (!super.hasGeometry(key)) {
					super.setGeometry(key, new THREE.LatheGeometry(super.getPath('M8,9 C8,6 8,4 6,4 L4,4 L4,1 L0,1 L0,0 L3,0 C6,0 9,3 9,9 C9,10 8,10 8,9 Z').getPoints(64), 64));
				}
				return super.getGeometry(key);
			}
			getHandleGeometry() {
				const key = 'CoffeeCup:Handle';
				if (!super.hasGeometry(key)) {
					const curve = new THREE.CubicBezierCurve3(new THREE.Vector3(8.5, 8, 0), new THREE.Vector3(14, 10, 0), new THREE.Vector3(11, 0, 0), new THREE.Vector3(5, 3, 0));
					super.setGeometry(key, new THREE.TubeGeometry(curve, 100, 0.5, 64, false));
				}
				return super.getGeometry(key);
			}
			getCup(material) {
				const mesh = new THREE.Group();
				mesh.add(new THREE.Mesh(this.getCupGeometry(), material));
				const handle = new THREE.Mesh(this.getHandleGeometry(), material);
				handle.scale.set(1, 1, 3);
				mesh.add(handle);
				const pillar = new THREE.Group();
				const center = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('Gray'));
				center.scale.set(0.8, 7, 0.8);
				center.position.y += 3.5;
				pillar.add(center);
				const table = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('White'));
				table.scale.set(3.2, 0.2, 3.2);
				table.position.y += 7;
				pillar.add(table);
				mesh.add(pillar);
				return mesh;
			}
			getInnerBase(cupMaterial, material) {
				const mesh = new THREE.Group();
				const base = new THREE.Mesh(super.getGeometry('Cylinder'), material);
				base.scale.set(3, 0.6, 3);
				mesh.add(base);
				const theta = Math.PI*2/cupMaterial.length;
				for (let i = 0; i < cupMaterial.length; ++i) {
					const x = 2*Math.sin(theta*i);
					const z = 2*Math.cos(theta*i);
					const cup = this.getCup(cupMaterial[i]);
					cup.scale.set(0.1, 0.1, 0.1);
					cup.rotation.y = Math.PI*2*Math.random();
					cup.position.set(x, 0.3, z);
					this.cupArray.push(cup);
					mesh.add(cup);
				}
				return mesh;
			}
			getBase() {
				const mesh = new THREE.Group();
				const base = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('Coffee1'));
				base.scale.set(7.5, 0.5, 7.5);
				mesh.add(base);

				const materials = ['Red', 'Green', 'Blue', 'Yellow', 'Mazenta', 'Cyan', 'Red', 'Green', 'Blue', 'Yellow', 'Mazenta', 'Cyan'];
				const innerBaseMaterials = ['LiteRed', 'LiteGreen', 'LiteBlue'];
				const theta = Math.PI*2/3;
				for (let i = 0; i < 3; ++i) {
					const x = 4*Math.sin(theta*i);
					const z = 4*Math.cos(theta*i);
					const cupMaterial = [];
					for (let j = 0; j < 4; ++j) { cupMaterial.push(super.getMaterial(materials[i*4+j])); }
					const innerBase = this.getInnerBase(cupMaterial, super.getMaterial(innerBaseMaterials[i]));
					innerBase.position.set(x, 0.05, z);
					this.innerBaseArray.push(innerBase);
					mesh.add(innerBase);
				}
				mesh.scale.set(0.8, 0.8, 0.8);
				return mesh;
			}
			constructor() {
				super();
				this.cupArray = [];
				this.innerBaseArray = [];
				this.coffeeCup = new THREE.Group();
				this.base = this.getBase();
				this.coffeeCup.add(this.base);
				this.camera = new THREE.PerspectiveCamera(75, getWidth()/getHeight(), 0.01, 1000);
				this.camera.position.set(0,12,0);
				this.camera.rotation.set(0.3,0,0);
				this.cupArray[0].add(this.camera);
			}
			getObject() { return this.coffeeCup; }
			getCamera() { return this.camera; }
			animate(speed) {
				this.cupArray.forEach((cup) => { cup.rotation.y += speed*15/1000; });
				this.innerBaseArray.forEach((base) => { base.rotation.y -= speed*6/1000; });
				this.base.rotation.y += speed*3/1000;
			}
		}
		</script>
		<script>
		class Train extends Attraction {
			getRail1Geometry() {
				const key = 'Train:Rail1';
				if (!super.hasGeometry(key)) { super.setGeometry(key, new THREE.TubeGeometry(this.curve, 256, 0.05, 64, false)); }
				return super.getGeometry(key);
			}
			getRail2Geometry() {
				const key = 'Train:Rail2';
				if (!super.hasGeometry(key)) { super.setGeometry(key, new THREE.TubeGeometry(this.curve, 256, 0.1, 64, false)); }
				return super.getGeometry(key);
			}
			getCarTopGeometry() {
				const key = 'Train;CarTop';
				if (!super.hasGeometry(key)) {
					const geometry = new THREE.BufferGeometry();
					const vertices = new Float32Array([
						0.0,  0.3, -0.5,	// 0
						0.0,  0.3,  0.5,	// 1
						0.0, -0.3,  0.5,	// 2
						0.0, -0.3, -0.5,	// 3
						0.8, -0.1,  0.2,	// 4
						0.8, -0.1, -0.2		// 5
					]);
					const indices = [1,0,2, 2,0,3, 0,1,4, 0,4,5, 5,4,2, 5,2,3, 4,1,2, 0,5,3];
					geometry.setIndex(indices);
					geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
					geometry.computeVertexNormals();
					super.setGeometry(key, geometry);
				}
				return super.getGeometry(key);
			}
			getFirstCar(color) {
				const head = new THREE.Group();
				head.add(this.getCar(color));
				// top
				const top = new THREE.Mesh(this.getCarTopGeometry(), super.getMaterial(color));
				top.scale.set(1.2, 1, 0.95);
				top.position.set(0.45, 0.03, 0);
				head.add(top);
				return head;
			}
			getCar(color) {
				const car = new THREE.Group();
				const carBody = new THREE.Mesh(super.getCaseGeometry(1.05, 0.6, 0.9, 0.15, 0.15, 0.15), super.getMaterial(color));
				car.add(carBody);
				const chair = new THREE.Mesh(super.getGeometry('Box'), super.getMaterial('LiteGray'));
				chair.scale.set(0.5, 0.1, 0.8);
				chair.position.set(-0.22, -0.1, 0);
				car.add(chair);
				return car;
			}
			getBase() {
				const rail = new THREE.Group();
				const rail1 = new THREE.Mesh(this.getRail1Geometry(), super.getMaterial('MetalBlack'));
				rail1.scale.set(1, 3, 1);
				rail.add(rail1);
				const rail2 = new THREE.Mesh(this.getRail2Geometry(), super.getMaterial('MetalBlack'));
				rail2.scale.set(1, 0.4, 1);
				rail2.position.y += 0.15;
				rail.add(rail2);
				return rail;
			}
			locateCars() {
				for (let i = 0; i < this.cars.length; ++i) {
					const car = this.cars[i];
					let pos = this.carPos + (this.cars.length - i)*0.009;
					if (pos > 1) { pos -= 1; }
					const p1 = this.curve.getPoint(pos);
					pos = this.carPos + (this.cars.length - i - 1)*0.009;
					if (pos > 1) { pos -= 1; }
					const p2 = this.curve.getPoint(pos);
					car.position.set(p2.x, 0.4, p2.z);
					
					const p = p1.clone();
					p.sub(p2);
					car.rotation.y = -Math.sign(p.z)*p.angleTo(new THREE.Vector3(1, 0, 0));
				}
			}
			constructor() {
				super();
				this.train = new THREE.Group();
				this.curve = super.getCurveXZ('M-26,-6 C-26,-11 -20,-14 -17,-14 C0,-14 0,2 17,2 C20,2 26,-1 26,-6 C26,-11 20,-14 17,-14 C0,-14 0,2 -17,2 C-20,2 -26,-1 -26,-6');
//				this.curve = super.getCurveXYZ('M-26,0,-6 C-26,0,-11 -20,0,-14 -17,0,-14 C0,0,-14 0,0,2 17,0,2 C20,0,2 26,0,-1 26,0,-6 C26,0,-11 20,0,-14 17,0,-14 C0,2,-14 0,2,2 -17,0,2 C-20,0,2 -26,0,-1 -26,0,-6');
				this.train.add(this.getBase());
				this.cars = [];
				this.cars.push(this.getFirstCar('Red'));
				['Green', 'Blue', 'Yellow', 'Mazenta', 'Cyan'].forEach((colorStr) => { this.cars.push(this.getCar(colorStr)); })
				for (let i = 0; i < this.cars.length; ++i) { this.train.add(this.cars[i]); }
				this.carPos = 0;
				this.locateCars();
				this.camera = new THREE.PerspectiveCamera(100, getWidth()/getHeight(), 0.01, 1000);
				this.camera.position.set(0, 1, 0);
				this.camera.rotation.set(0, -Math.PI/2+0.7, 0);
				this.cars[0].add(this.camera);
			}
			getObject() { return this.train; }
			getCamera() { return this.camera; }
			animate(speed) {
				this.carPos += speed*0.3/1000;
				if (this.carPos > 1) { this.carPos -= 1; }
				this.locateCars();
			}
		}
		</script>

		<script>
		class Fountain extends Attraction {
			static G = 0.001;
			getTorusGeometry() {
				const key = 'Fountain:Torus';
				if (!super.hasGeometry(key)) {
					super.setGeometry(key, new THREE.TorusGeometry(10, 1, 64, 64));
				}
				return super.getGeometry(key);
			}
			getDropsGeometry() {
				if (this.dropGeometry != null) { this.dropGeometry.dispose(); }
				const pos = [];
				for (let i = 0; i < this.dropInfos.length; ++i) {
					let [x, y, z, vx, vy, vz] = this.dropInfos[i];
					pos.push(x, y, z);
				}
				this.dropGeometry = new THREE.BufferGeometry();
				this.dropGeometry.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
				return this.dropGeometry;
			}
			getDropInfo(time = 0) {
				const r = Math.random()*0.5+0.4;
				const theta = Math.random()*Math.PI*2;
				let x = Math.sin(theta)*r;
				let y = 6;
				let z = Math.cos(theta)*r;
				let vx = x*0.025;
				let vy = Math.random()*0.03+Math.sin(this.tick*0.005)*0.05+0.1;
				let vz = z*0.025;
				if (time != 0) {
					x += vx*time;
					y += vy*time - 0.5*Fountain.G*time*time;
					z += vz*time;
					vy -= Fountain.G*time;
				}
				return [x, y, z, vx, vy, vz];
			}
			constructor() {
				super();
				this.tick = 0;
				this.fountain = new THREE.Group();
				const water = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('LiteBlue'));
				water.scale.set(10, 1, 10);
				this.fountain.add(water);
				const torus1 = new THREE.Mesh(this.getTorusGeometry(), super.getMaterial('Gray'));
				torus1.scale.set(1, 1, 1.5);
				torus1.rotation.x = Math.PI/2;
				this.fountain.add(torus1);
				const torus2 = new THREE.Mesh(this.getTorusGeometry(), super.getMaterial('Gray'));
				torus2.scale.set(0.6, 0.6, 1.4);
				torus2.rotation.x = Math.PI/2;
				this.fountain.add(torus2);
				const cylinder = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('LiteGray'));
				cylinder.scale.set(1, 6, 1);
				cylinder.position.y = 3;
				this.fountain.add(cylinder);
				this.dropInfos = [];
				for (let i = 0; i < 3000; ++i) {
					let info = null;
					while (info == null || info[1] < 0) { info = this.getDropInfo(300*Math.random()); }
					this.dropInfos.push(info);
				}
				this.dropGeometry = null;
				this.drops = new THREE.Points(this.getDropsGeometry(), new THREE.PointsMaterial({size: 0.03, color: 0xc0c0ff}));
				this.fountain.add(this.drops);
				this.fountain.scale.set(0.15, 0.15, 0.15);
			}
			getObject() { return this.fountain; }
			getCamera() { return null; }
			animate(speed) {
				for (let i = 0; i < this.dropInfos.length; ++i) {
					let [x, y, z, vx, vy, vz] = this.dropInfos[i];
					vy -= Fountain.G;
					this.dropInfos[i] = (y > 0)?[x+vx, y+vy, z+vz, vx, vy, vz]:this.getDropInfo(0);
				}
				this.drops.geometry = this.getDropsGeometry();
				++this.tick;
			}
		}
		</script>
		<script>
		class Firework extends Attraction {
			static G = 0.0001;
			getSparksGeometry(sparkInfos) {
				const pos = [];
				for (let i = 0; i < sparkInfos.length; ++i) {
					let [x, y, z, vx, vy, vz] = sparkInfos[i];
					pos.push(x, y, z);
				}
				const sparksGeometry = new THREE.BufferGeometry();
				sparksGeometry.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
				return sparksGeometry;
			}
			getSparksMaterial() {
				const colors = [0xff8080, 0x80ff80, 0x8080ff, 0xffff80, 0xff80ff, 0x80ffff, 0xffffff];
				return new THREE.PointsMaterial({size: 0.03, color: colors[Math.floor(Math.random()*7)]});
			}
			getSparkInfo(sizeRate, vRate) {
				const x = Math.random()-0.5;
				const y = Math.random()-0.5;
				const z = Math.random()-0.5;
				const vx = x*(Math.random()-0.5);
				const vy = y*(Math.random()-0.5) + this.v1;
				const vz = z*(Math.random()-0.5);
				const t = 100 + Math.random()*200;
				return [x*sizeRate, y*sizeRate, z*sizeRate, vx*vRate, vy*vRate, vz*vRate, t];
			}
			reset(tInit1 = 0, tInit2 = 100) {
				this.tick = 0;
				this.v1 = 0.05*(Math.random()-0.5)+0.1;
				this.t0 = tInit2*Math.random() + tInit1;
				this.t1 = this.t0 + 50*Math.random()+220;
				this.sparkInfos1 = [];
				for (let i = Math.random()*500 + 800; i > 0; --i) { this.sparkInfos1.push(this.getSparkInfo(0.05, 0.13)); }
				this.sparkInfos2 = [];
				for (let i = Math.random()*500 + 300; i > 0; --i) { this.sparkInfos2.push(this.getSparkInfo(0.04, 0.08)); }
			}
			constructor() {
				super();
				this.reset(640, 100);
				this.firework = new THREE.Group();
				this.sparks1 = new THREE.Points(this.getSparksGeometry(this.sparkInfos1), this.getSparksMaterial());
				this.firework.add(this.sparks1);
				this.sparks2 = new THREE.Points(this.getSparksGeometry(this.sparkInfos2), this.getSparksMaterial());
				this.firework.add(this.sparks2);
				const cylinder = new THREE.Mesh(super.getGeometry('Cylinder'), super.getMaterial('LiteRed'));
				cylinder.scale.set(0.1, 0.3, 0.1);
				this.firework.add(cylinder);
				this.firework.scale.set(0.5,0.5,0.5);
			}
			getObject() { return this.firework; }
			getCamera() { return null; }
			animate(speed) {
				++this.tick;
				if (this.tick < this.t0) { return; }
				else if (this.tick < this.t1) {
					for (let i = 0; i < this.sparkInfos1.length; ++i) {
						const [x, y, z, vx, vy, vz, t] = this.sparkInfos1[i];
						this.sparkInfos1[i] = [x, y+this.v1, z, vx, vy, vz, t];
					}
					for (let i = 0; i < this.sparkInfos2.length; ++i) {
						const [x, y, z, vx, vy, vz, t] = this.sparkInfos2[i];
						this.sparkInfos2[i] = [x, y+this.v1, z, vx, vy, vz, t];
					}
				}
				else if (this.sparkInfos1.length + this.sparkInfos2.length > 0) {
					const newInfos1 = [];
					for (let i = 0; i < this.sparkInfos1.length; ++i) {
						const [x, y, z, vx, vy, vz, t] = this.sparkInfos1[i];
						if (t > 0) { newInfos1.push([x+vx, y+vy, z+vz, vx, vy-Firework.G, vz, t-1]); }
					}
					this.sparkInfos1 = newInfos1;
					const newInfos2 = [];
					for (let i = 0; i < this.sparkInfos2.length; ++i) {
						const [x, y, z, vx, vy, vz, t] = this.sparkInfos2[i];
						if (t > 0) { newInfos2.push([x+vx, y+vy, z+vz, vx, vy-Firework.G, vz, t-1]); }
					}
					this.sparkInfos2 = newInfos2;
				}
				else {
					this.reset(0, 100);
					this.sparks1.material.dispose();
					this.sparks1.material = this.getSparksMaterial();
					this.sparks2.material.dispose();
					this.sparks2.material = this.getSparksMaterial();
				}
				this.sparks1.geometry.dispose();
				this.sparks1.geometry = this.getSparksGeometry(this.sparkInfos1);
				this.sparks2.geometry.dispose();
				this.sparks2.geometry = this.getSparksGeometry(this.sparkInfos2);
			}
		}
		</script>

				const body = new THREE.Mesh(this.getBodyGeometry(), super.getMaterial('Gray'));
				body.rotation.set(Math.PI/2, 0, 0);
				body.position.set(0, 2, 0);
				return body;
			}
			constructor() {
				super();
				this.drone = new THREE.Group();
				this.blades1 = this.getBlades();
				this.blades1.position.set(-30, 0, -23);
				this.drone.add(this.blades1);
				this.blades2 = this.getBlades();
				this.blades2.rotation.set(Math.PI, 0, 0);
				this.blades2.position.set( 30, 0, -23);
				this.drone.add(this.blades2);
				this.blades3 = this.getBlades();
				this.blades3.rotation.set(Math.PI, 0, 0);
				this.blades3.position.set(-30, 0,  23);
				this.drone.add(this.blades3);
				this.blades4 = this.getBlades();
				this.blades4.position.set( 30, 0,  23);
				this.drone.add(this.blades4);
				const pillar1 = this.getPillar();
				pillar1.rotation.set(0, -0.65, 0);
				this.drone.add(pillar1);
				const pillar2 = this.getPillar();
				pillar2.rotation.set(0,  0.65, 0);
				this.drone.add(pillar2);
				this.drone.add(this.getBody());
				this.drone.rotation.y = -Math.PI/2;
				this.camera = new THREE.PerspectiveCamera(90, getWidth()/getHeight(), 0.01, 10000);
				this.camera.position.set(0, -20, 0);
				this.camera.lookAt(-40, -40, 0);
				this.drone.add(this.camera);
				this.drone.scale.set(0.01, 0.01, 0.01);
				this.fb = 0;
				this.lr = 0;
				this.ud = 0;
			}
			getObject() { return this.drone; }
			getCamera() { return this.camera; }
			setParameter(fb, lr, ud) {
				this.fb = fb;
				this.lr = lr;
				this.ud = ud;
			}
			animate(speed) {
				this.blades1.rotation.y += 0.3;
				this.blades2.rotation.y += 0.3;
				this.blades3.rotation.y += 0.3;
				this.blades4.rotation.y += 0.3;
				this.drone.rotation.y -= this.lr*0.002;
				this.drone.position.y = Math.min(20, Math.max(this.drone.position.y - this.ud*0.01, 2));
				this.drone.position.x = Math.min(21, Math.max(this.drone.position.x + this.fb*0.005*Math.cos(this.drone.rotation.y), -21));
				this.drone.position.z = Math.min(21, Math.max(this.drone.position.z - this.fb*0.005*Math.sin(this.drone.rotation.y), -21));
			}
		}
		</script>
		<script>
			function getDesk() {
				const mesh = new THREE.Mesh(new THREE.BoxGeometry(64, 1, 32), m = new THREE.MeshStandardMaterial({color: 0x999999, metalness: 0.1, roughness: 0.3}));
				mesh.position.y = -0.5;
				return mesh;
			}
			
			const iSpeed = document.querySelector('#iSpeed');
			let currentSpeed = 0;
			document.querySelector('#bStop').addEventListener('click', () => {iSpeed.value = 0; });
			const canvas = document.querySelector('#canvas');
			function getWidth()  { return canvas.getBoundingClientRect().width; }
			function getHeight() { return canvas.getBoundingClientRect().height; }
	
			const scene = new THREE.Scene();
			const directionLight = new THREE.DirectionalLight(0xffffff, 3);
			directionLight.position.set(1, 0.5, 1);
			scene.add(directionLight);
			const ambientLight = new THREE.AmbientLight(0x999999, 0.3);
			scene.add(ambientLight);
			
			const ferrisWheel = new FerrisWheel();
			ferrisWheel.getObject().rotation.y = 0.5;
			ferrisWheel.setPosition(-17, 0, -6);
			const merryGoRound = new MerryGoRound();
			merryGoRound.setPosition(17, 0, -6);
			const coffeeCup = new CoffeeCup();
			coffeeCup.setPosition(0, 0, 6);
			const train = new Train();
			train.setPosition(0, -0.1, 0);
			const symbol = new Symbol();
			symbol.setPosition(-14, -0.1, 9);
			const fountain = new Fountain();
			fountain.setPosition(13, -0.1, 8);
			const firework1 = new Firework();
			firework1.setPosition(-11, 0, 5);
			const firework2 = new Firework();
			firework2.setPosition( 8, 0, 5);
			const firework3 = new Firework();
			firework3.setPosition(0, 0, -2);
			const actors = [ferrisWheel, merryGoRound, coffeeCup, train, symbol, fountain, firework1, firework2, firework3];
//			const actors = [];
			actors.forEach((actor) => scene.add(actor.getObject()));
			
			const drone = new Drone();
			drone.setPosition(0, 6, 21);
			scene.add(drone.getObject());
			
			const bench1 = new Bench();
			bench1.getObject().rotation.y = 0.7;
			bench1.setPosition(-13, 0, 8.3);
			const bench2 = new Bench();
			bench2.getObject().rotation.y = 0.7 - Math.PI;
			bench2.setPosition(-13.3, 0, 8.0);
			const bench3 = new Bench();
			bench3.getObject().rotation.y = -0.9;
			bench3.setPosition(28, 0, -12);
			const bench4 = new Bench();
			bench4.getObject().rotation.y = 0.5;
			bench4.setPosition(10, 0, 6);
			const bench5 = new Bench();
			bench5.getObject().rotation.y = -0.7;
			bench5.setPosition(16, 0, 6);
			[getDesk(), bench1.getObject(), bench2.getObject(), bench3.getObject(), bench4.getObject(), bench5.getObject()].forEach((object) => scene.add(object));
			
			const cameraFix = new THREE.PerspectiveCamera(75, getWidth()/getHeight(), 0.01, 1000);
			cameraFix.position.set(0, 5, 20);
			const renderer = new THREE.WebGLRenderer();
			renderer.setSize(getWidth(), getHeight());
			renderer.setClearColor(0xd0a050);
			const controls = new THREE.OrbitControls(cameraFix, renderer.domElement);
			Object.assign(controls, {rotateSpeed: 0.5, enableDamping: true, dampingFactor: 0.05});

			function setDaypart() {
				if (document.querySelector('#evening[name="daypart"]').checked) {
					directionLight.position.set(1, 0.5, 1);
					directionLight.color = new THREE.Color().setHex(0xffffff);
					directionLight.intensity = 2;
					ambientLight.color = new THREE.Color().setHex(0x999999);
					ambientLight.intensity = 0.3;
					renderer.setClearColor(0xd0a050);
				}
				else if (document.querySelector('#noon[name="daypart"]').checked) {
					directionLight.position.set(0.5, 1, 0.5);
					directionLight.color = new THREE.Color().setHex(0xffffff);
					directionLight.intensity = 2.5;
					ambientLight.color = new THREE.Color().setHex(0x999999);
					ambientLight.intensity = 1;
					renderer.setClearColor(0x0080ff);
				}
				else if (document.querySelector('#night[name="daypart"]').checked) {
					directionLight.position.set(1, 0.5, 1);
					directionLight.color = new THREE.Color().setHex(0xffffff);
					directionLight.intensity = 0;
					ambientLight.color = new THREE.Color().setHex(0x999999);
					ambientLight.intensity = 0.6;
					renderer.setClearColor(0x333333);
				}
				else { return; }
			}
			
			setDaypart();
			document.querySelectorAll('input[name="daypart"]').forEach((element) => element.addEventListener('change', setDaypart));
			canvas.appendChild(renderer.domElement);
			
			function animate() {
				function getCamera() {
					let camera = cameraFix;
					if (document.querySelector('#ferris[name="camera"]').checked) { camera = ferrisWheel.getCamera(); }
					if (document.querySelector('#merry[name="camera"]') .checked) { camera = merryGoRound.getCamera(); }
					if (document.querySelector('#coffee[name="camera"]').checked) { camera = coffeeCup.getCamera(); }
					if (document.querySelector('#train[name="camera"]') .checked) { camera = train.getCamera(); }
					if (document.querySelector('#drone[name="camera"]') .checked) { camera = drone.getCamera(); }
					camera.aspect = getWidth() / getHeight();
					camera.updateProjectionMatrix();
					return camera;
				}
				renderer.setSize(getWidth(), getHeight());
				const camera = getCamera();
				if (camera == cameraFix) { controls.target.set(0,4,0); controls.update(); }
				renderer.render(scene, camera);
				requestAnimationFrame(animate);
				const target = Number(iSpeed.value);
				if (currentSpeed != target) { currentSpeed = (currentSpeed < target)?Math.min(currentSpeed+0.01, target):Math.max(currentSpeed-0.01, target); }
				actors.forEach((actor) => actor.animate(currentSpeed));
				
				drone.setParameter(Number(document.querySelector('#droneFB').value), Number(document.querySelector('#droneLR').value), Number(document.querySelector('#droneUD').value));
				drone.animate(currentSpeed);
			}

			animate();
		</script>
	</body>
</html>
